<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS WebChat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #151820;
    --border:    #252a35;
    --accent:    #00d4ff;
    --accent2:   #7b5ea7;
    --green:     #39d353;
    --yellow:    #e3b341;
    --red:       #f85149;
    --text:      #c9d1d9;
    --muted:     #58606a;
    --font:      'Courier New', Courier, monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 960px; margin: 0 auto; }

  /* ── Header ── */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #header h1 { font-size: 15px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  #header h1 span { color: var(--muted); }

  #conn-status {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);
  }
  #conn-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--red);
    transition: background 0.3s;
  }
  #conn-dot.connected    { background: var(--green); }
  #conn-dot.reconnecting { background: var(--yellow); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  #session-label { font-size: 11px; color: var(--muted); }

  /* ── Messages ── */
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: var(--bg); }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex; flex-direction: column; max-width: 100%;
    padding: 6px 10px; border-radius: 4px; line-height: 1.5;
    border-left: 3px solid transparent;
  }
  .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .msg-body { white-space: pre-wrap; word-break: break-word; }

  .msg.user   { border-left-color: var(--accent2); background: rgba(123,94,167,0.08); }
  .msg.system { border-left-color: var(--accent);  background: rgba(0,212,255,0.06); }
  .msg.event  { border-left-color: var(--yellow);  background: rgba(227,179,65,0.06); }
  .msg.error  { border-left-color: var(--red);     background: rgba(248,81,73,0.08); color: var(--red); }
  .msg.info   { border-left-color: var(--muted);   color: var(--muted); font-size: 12px; }

  /* ── Input bar ── */
  #inputbar {
    display: flex; gap: 8px; padding: 10px 16px;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  #msg-input {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 8px 12px; font-family: var(--font); font-size: 14px;
    outline: none; resize: none; height: 40px; min-height: 40px; max-height: 120px;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }
  #send-btn {
    background: var(--accent); color: var(--bg); border: none; border-radius: 4px;
    padding: 0 18px; font-family: var(--font); font-size: 13px; font-weight: bold;
    cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s;
  }
  #send-btn:disabled { opacity: 0.35; cursor: default; }
  #send-btn:not(:disabled):hover { opacity: 0.85; }

  /* ── Token modal ── */
  #modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #modal-overlay.hidden { display: none; }
  #modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 28px 32px; width: 360px; max-width: 90vw;
  }
  #modal h2 { color: var(--accent); font-size: 14px; letter-spacing: 2px; margin-bottom: 16px; }
  #modal p  { color: var(--muted); font-size: 12px; margin-bottom: 16px; line-height: 1.5; }
  #modal input {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 8px 10px; font-family: var(--font); font-size: 13px;
    outline: none; margin-bottom: 14px;
  }
  #modal input:focus { border-color: var(--accent); }
  #modal-submit {
    width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 4px;
    padding: 9px; font-family: var(--font); font-size: 13px; font-weight: bold;
    cursor: pointer; letter-spacing: 1px;
  }
  #modal-submit:hover { opacity: 0.85; }
  #modal-err { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>

<!-- Token modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>NEXUS GATEWAY</h2>
    <p>Enter your gateway auth token to connect.<br>
       Alternatively, reload with <code>?token=&lt;token&gt;</code> in the URL.</p>
    <input type="password" id="token-input" placeholder="Auth token" autocomplete="off">
    <input type="text"     id="user-input"  placeholder="Username (optional)" autocomplete="off" value="">
    <button id="modal-submit">CONNECT</button>
    <div id="modal-err"></div>
  </div>
</div>

<!-- Main UI -->
<div id="app">
  <div id="header">
    <h1>NEXUS <span>//</span> WebChat</h1>
    <div id="session-label"></div>
    <div id="conn-status">
      <div id="conn-dot"></div>
      <span id="conn-text">Disconnected</span>
    </div>
  </div>
  <div id="messages"></div>
  <div id="inputbar">
    <textarea id="msg-input" placeholder="Type a task or /status /queue /health …" rows="1"></textarea>
    <button id="send-btn" disabled>SEND</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── Config ────────────────────────────────────────────────────────────────
  const WS_PORT   = 8765;
  const HTTP_PORT = 8766;
  const WS_HOST   = location.hostname || 'localhost';
  const WS_URI    = `ws://${WS_HOST}:${WS_PORT}`;
  const HTTP_BASE = `http://${WS_HOST}:${HTTP_PORT}`;
  const CHANNEL   = 'webchat';

  // ── State ─────────────────────────────────────────────────────────────────
  let ws          = null;
  let authToken   = '';
  let userId      = '';
  let sessionId   = '';
  let reqCounter  = 0;
  let reconnDelay = 1000;
  let reconnTimer = null;
  let connected   = false;
  let pendingReqs = {};   // request_id → resolve fn (unused but tracked)

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const $messages     = document.getElementById('messages');
  const $input        = document.getElementById('msg-input');
  const $sendBtn      = document.getElementById('send-btn');
  const $connDot      = document.getElementById('conn-dot');
  const $connText     = document.getElementById('conn-text');
  const $sessionLabel = document.getElementById('session-label');
  const $modalOverlay = document.getElementById('modal-overlay');
  const $tokenInput   = document.getElementById('token-input');
  const $userInput    = document.getElementById('user-input');
  const $modalSubmit  = document.getElementById('modal-submit');
  const $modalErr     = document.getElementById('modal-err');

  // ── Utility ───────────────────────────────────────────────────────────────
  function reqId()    { return `req-${++reqCounter}`; }
  function tsNow()    { return new Date().toISOString(); }
  function fmtTime(iso) {
    try { return new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}); }
    catch { return ''; }
  }

  function makeMsg(type, payload, rid) {
    const m = { type, timestamp: tsNow() };
    if (payload && Object.keys(payload).length) m.payload = payload;
    if (rid) m.request_id = rid;
    return m;
  }

  // ── Display ───────────────────────────────────────────────────────────────
  function appendMsg(kind, author, body, ts) {
    const el   = document.createElement('div');
    el.className = `msg ${kind}`;
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = `${fmtTime(ts || tsNow())}  ${author}`;
    const bd   = document.createElement('div');
    bd.className = 'msg-body';
    bd.textContent = body;
    el.appendChild(meta);
    el.appendChild(bd);
    $messages.appendChild(el);
    $messages.scrollTop = $messages.scrollHeight;
  }

  function sysMsg(text, kind = 'info') { appendMsg(kind, 'NEXUS', text, tsNow()); }

  // ── Connection status ─────────────────────────────────────────────────────
  function setStatus(state, label) {
    $connDot.className = state;          // 'connected' | 'reconnecting' | ''
    $connText.textContent = label;
    connected = (state === 'connected');
    $sendBtn.disabled = !connected;
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connect() {
    if (ws) { try { ws.close(); } catch(_) {} }
    setStatus('reconnecting', 'Connecting…');
    ws = new WebSocket(WS_URI);

    ws.onopen = () => {
      reconnDelay = 1000;
      // Send auth handshake
      ws.send(JSON.stringify(makeMsg('connect', {
        auth_token: authToken,
        user_id:    userId,
        channel:    CHANNEL,
      }, reqId())));
    };

    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      handleServerMsg(msg);
    };

    ws.onerror = () => {
      setStatus('', 'Error');
    };

    ws.onclose = () => {
      setStatus('', 'Disconnected');
      sessionId = '';
      $sessionLabel.textContent = '';
      scheduleReconnect();
    };
  }

  function scheduleReconnect() {
    if (reconnTimer) return;
    reconnTimer = setTimeout(() => {
      reconnTimer = null;
      if (authToken) {
        setStatus('reconnecting', `Reconnecting in ${reconnDelay/1000}s…`);
        connect();
      }
    }, reconnDelay);
    reconnDelay = Math.min(reconnDelay * 2, 30000);
  }

  // ── Server message router ─────────────────────────────────────────────────
  function handleServerMsg(msg) {
    const type    = msg.type || '';
    const payload = msg.payload || {};
    const ts      = msg.timestamp;

    switch (type) {
      case 'connected':
        sessionId = payload.session_id || '';
        setStatus('connected', 'Connected');
        $sessionLabel.textContent = sessionId ? `session: ${sessionId}` : '';
        sysMsg(`Connected  •  session ${sessionId}`, 'system');
        break;

      case 'command_response': {
        const text = payload.text
          || (payload.task_id ? `Task queued: ${payload.task_id}  [${payload.status || ''}]` : null)
          || JSON.stringify(payload);
        appendMsg('system', 'NEXUS', text, ts);
        break;
      }

      case 'queue_response':
        appendMsg('system', 'NEXUS', payload.text || '(empty queue)', ts);
        break;

      case 'event': {
        const evName = payload.event || 'event';
        const data   = payload.data  || {};
        const detail = Object.entries(data).map(([k,v]) => `${k}: ${v}`).join('  ');
        appendMsg('event', `EVENT:${evName}`, detail || '(no data)', ts);
        break;
      }

      case 'error':
        appendMsg('error', 'ERROR', payload.error || 'Unknown error', ts);
        break;

      default:
        appendMsg('info', type, JSON.stringify(payload), ts);
    }
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  function sendRaw(msgObj) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      sysMsg('Not connected.', 'error');
      return;
    }
    ws.send(JSON.stringify(msgObj));
  }

  function handleInput(text) {
    text = text.trim();
    if (!text) return;

    if (text.startsWith('/')) {
      const cmd = text.slice(1).toLowerCase().split(/\s+/)[0];
      switch (cmd) {
        case 'status':
          appendMsg('user', userId, '/status', tsNow());
          sendRaw(makeMsg('command', { command: 'status' }, reqId()));
          break;
        case 'queue':
          appendMsg('user', userId, '/queue', tsNow());
          sendRaw(makeMsg('queue_status', {}, reqId()));
          break;
        case 'health':
          appendMsg('user', userId, '/health', tsNow());
          fetchHealth();
          break;
        default:
          sysMsg(`Unknown command: ${text}\nAvailable: /status  /queue  /health`, 'error');
      }
    } else {
      appendMsg('user', userId, text, tsNow());
      sendRaw(makeMsg('submit_task', { description: text, priority: 'P2' }, reqId()));
    }
  }

  async function fetchHealth() {
    try {
      const r    = await fetch(`${HTTP_BASE}/health`);
      const data = await r.json();
      const body = `status: ${data.status}  |  clients: ${data.connected_clients}  |  queue: ${data.queue_size}`;
      appendMsg('system', 'HEALTH', body, tsNow());
    } catch (e) {
      appendMsg('error', 'HEALTH', `HTTP request failed: ${e.message}`, tsNow());
    }
  }

  // ── Input events ──────────────────────────────────────────────────────────
  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = $input.value;
      $input.value = '';
      autoResize();
      handleInput(text);
    }
  });

  $sendBtn.addEventListener('click', () => {
    const text = $input.value;
    $input.value = '';
    autoResize();
    handleInput(text);
  });

  function autoResize() {
    $input.style.height = '40px';
    $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
  }
  $input.addEventListener('input', autoResize);

  // ── Token / boot ──────────────────────────────────────────────────────────
  function startWithToken(token, user) {
    authToken = token;
    userId    = user || 'webchat-user';
    sessionStorage.setItem('nexus_token', token);
    if (user) sessionStorage.setItem('nexus_user', user);
    $modalOverlay.classList.add('hidden');
    sysMsg('Connecting to NEXUS Gateway…', 'info');
    connect();
  }

  $modalSubmit.addEventListener('click', () => {
    const t = $tokenInput.value.trim();
    const u = $userInput.value.trim();
    if (!t) { $modalErr.textContent = 'Token is required.'; return; }
    $modalErr.textContent = '';
    startWithToken(t, u);
  });

  $tokenInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $modalSubmit.click();
  });

  // Check URL param first, then sessionStorage
  const params   = new URLSearchParams(location.search);
  const urlToken = params.get('token');
  const urlUser  = params.get('user');
  const storedToken = sessionStorage.getItem('nexus_token');
  const storedUser  = sessionStorage.getItem('nexus_user');

  if (urlToken) {
    // Remove token from URL bar without reloading
    const clean = location.pathname + (urlUser ? `?user=${encodeURIComponent(urlUser)}` : '');
    history.replaceState(null, '', clean);
    startWithToken(urlToken, urlUser || storedUser || '');
  } else if (storedToken) {
    startWithToken(storedToken, storedUser || '');
  }
  // else: modal stays visible

})();
</script>
</body>
</html>
