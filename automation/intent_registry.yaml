intents:
- id: ns-001
  category: next_step
  priority: P0
  title: Populate intent registry with current priorities
  description: 'Create the intent_registry.yaml file at /opt/nexus/automation/intent_registry.yaml
    with all P0-P3 tasks defined. This is the gate for Prompt 23''s planning engine.
    The orchestrator reads this file to determine what to execute next. Without it,
    the autonomous system has no instructions.

    '
  acceptance_criteria:
  - intent_registry.yaml exists at /opt/nexus/automation/intent_registry.yaml
  - File parses as valid YAML with no errors
  - 'All intents have required fields: id, category, title, description, acceptance_criteria,
    depends_on, autonomous, risk, complexity'
  - Planning engine from Prompt 23 can read and select the next task from this file
  affected_files:
  - /opt/nexus/automation/intent_registry.yaml
  depends_on: []
  autonomous: false
  risk: low
  complexity: low
  tier1_required: false
  status: completed
- id: ns-002
  category: next_step
  priority: P1
  title: Flash Pi Pico 2s as HID keyboard and mouse
  description: 'Flash both Pi Pico 2s attached to nexus-admin with CircuitPython and
    adafruit_hid. Pico A becomes a programmable USB keyboard, Pico B becomes a programmable
    USB mouse. Write a Python control library at /opt/nexus/automation/hid_controller.py
    on nexus-admin that exposes functions: type_text(), press_key(), key_combo(),
    move_mouse(x, y), click(), right_click(), scroll(). The orchestrator imports this
    library to physically interact with nexus-admin''s desktop or any machine the
    Picos are plugged into.

    '
  acceptance_criteria:
  - Pico A recognized as USB keyboard by nexus-admin (ls /dev/ttyACM* or /dev/hidraw*)
  - Pico B recognized as USB mouse by nexus-admin
  - hid_controller.type_text('hello world') types into whatever window is focused
  - hid_controller.click(x, y) moves cursor to coordinates and clicks
  - Round-trip latency under 200ms per command
  affected_files:
  - /opt/nexus/automation/hid_controller.py
  - /opt/nexus/automation/pico_firmware/keyboard_hid.py
  - /opt/nexus/automation/pico_firmware/mouse_hid.py
  depends_on: []
  autonomous: true
  risk: low
  complexity: low
  tier1_required: false
  status: completed
- id: ns-003
  category: next_step
  priority: P1
  title: Deploy Ollama subagent on spare cluster node
  description: 'Identify which Pi node has the most available headroom (nexus-storage
    at 0.8% CPU and 137MB Geth is the likely candidate). Install Ollama, pull a small
    model (Qwen2.5-1.5B-Instruct or SmolLM2-1.7B, both fit in ~2GB RAM on ARM64).
    Configure to listen on local network at <node-ip>:11434. Write a thin Python client
    at /opt/nexus/automation/subagent_client.py that the orchestrator calls with functions:
    subagent.summarize(text), subagent.review_code(filepath), subagent.research(query).
    Each call gets an ECT cost assigned so the token economy tracks subagent usage.
    Must not degrade Geth or IPFS performance on the host node.

    '
  acceptance_criteria:
  - Ollama running as systemd service on chosen node
  - curl http://<node-ip>:11434/api/generate returns a response
  - subagent_client.py successfully delegates a summarize task and returns result
  - Response latency under 30 seconds for a 500-token prompt
  - Geth and IPFS on same node remain unaffected (CPU stays under 50% during inference)
  affected_files:
  - /opt/nexus/automation/subagent_client.py
  - /opt/nexus/automation/constitution.json
  - /etc/systemd/system/ollama.service
  depends_on: []
  autonomous: false
  risk: medium
  complexity: medium
  tier1_required: false
  status: completed
- id: ns-004
  category: next_step
  priority: P1
  title: Register expanded tool surface in orchestrator
  description: 'Extend the planning engine''s tool registry to include: HID controller
    (from ns-002), Ollama subagent (from ns-003), SSH remote command execution on
    cluster nodes, and HTTP fetch for web resources. Each tool gets a formal definition
    with name, description, ECT cost, risk level, and whether it requires Md approval.
    The planning engine''s task selector matches intents to tools. A review_code intent
    delegates to Ollama subagent. A deploy_config intent uses SSH. A research intent
    uses web fetch or subagent. Tool definitions stored in tool_registry.yaml.

    '
  acceptance_criteria:
  - Tool registry file exists at /opt/nexus/automation/tool_registry.yaml
  - Planning engine can list available tools and their capabilities
  - At least one intent executed end-to-end using a non-trivial tool
  - ECT costs deducted correctly per tool invocation
  - Tools requiring Md approval block and wait rather than executing
  affected_files:
  - /opt/nexus/automation/tool_registry.yaml
  - /opt/nexus/automation/planning_engine.py
  - /opt/nexus/automation/constitution.json
  - /opt/nexus/agents/tokens/ect_manager.py
  depends_on:
  - ns-002
  - ns-003
  autonomous: true
  risk: medium
  complexity: high
  tier1_required: false
  status: decomposed
- id: np-001
  category: next_phase
  priority: P2
  title: "NEXUS Command Center \u2014 core dashboard"
  description: 'Build a lightweight web app (Flask or FastAPI backend, single-page
    frontend) running on nexus-admin (Pi 500) that reads from the orchestrator''s
    existing data: intent_registry.yaml for task status, decision logs for change
    history, constitution.json for cluster state, and systemd service status for health.
    Key views: changelog feed (recent actions with short descriptions), task board
    (intent registry items by status), cluster health overview (node status, Geth
    sync, IPFS peers), and goal horizons (short-term vs long-term from intent categories).
    Must work fully offline on cluster LAN with no external dependencies.

    '
  acceptance_criteria:
  - Web UI accessible at http://nexus-admin.local:8080 or 192.168.8.153:8080
  - Changelog view shows last 50 orchestrator actions with timestamp and description
  - Task board accurately reflects intent_registry.yaml state
  - Cluster health panel shows all 4 nodes with up/down, Geth block height, IPFS peers
  - Page loads in under 3 seconds on local network
  - "No external dependencies \u2014 works fully offline"
  affected_files:
  - /opt/nexus/dashboard/
  - /opt/nexus/automation/intent_registry.yaml
  - /opt/nexus/agents/logs/decisions/
  - /opt/nexus/automation/constitution.json
  depends_on:
  - ns-001
  autonomous: true
  risk: low
  complexity: medium
  tier1_required: false
  status: decomposed
- id: np-002
  category: next_phase
  priority: P2
  title: "Integrated chat interface \u2014 bidirectional communication"
  description: 'Add a chat interface to the Command Center that serves as the two-way
    communication channel between Md and the autonomous assistant. When Md sends a
    message, it routes to the Qwen 3.5 35B A3B on ThinkPad (primary) or falls back
    to local Ollama subagent on Pi when ThinkPad is offline. When the assistant needs
    approval for a non-autonomous task, it posts here and waits. Chat persists as
    JSONL on nexus-admin. Assistant can push notifications: task completions, blockers,
    deployment confirmations. Includes approval workflow where assistant asks yes/no
    and Md responds to unblock execution.

    '
  acceptance_criteria:
  - Chat panel in dashboard where Md can type and receive responses
  - Messages route to ThinkPad Ollama (Qwen 3.5) when reachable, fallback to local
    Pi Ollama
  - Assistant can initiate messages (push approvals, status updates, questions)
  - Chat history persists in /opt/nexus/automation/logs/chat_history.jsonl
  - 'Approval workflow: assistant posts question, Md responds, orchestrator proceeds'
  - Unread notification indicator when assistant has pending questions
  affected_files:
  - /opt/nexus/dashboard/
  - /opt/nexus/automation/logs/chat_history.jsonl
  - /opt/nexus/automation/planning_engine.py
  depends_on:
  - np-001
  - ns-003
  autonomous: true
  risk: medium
  complexity: high
  tier1_required: false
  status: decomposed
- id: np-003
  category: next_phase
  priority: P2
  title: Changelog and audit system
  description: "Implement structured change logging across the orchestrator. Every\
    \ file modification, contract deployment, command execution, or config change\
    \ writes a structured entry to /opt/nexus/automation/logs/changelog.jsonl with:\
    \ timestamp, action_type (file_edit, command_run, deploy, config_change), short\
    \ description (<100 chars), files_affected (with SHA256 before/after hashes),\
    \ intent_id that triggered it, reversible flag, and rollback_command if applicable.\
    \ File backups created in /opt/nexus/automation/backups/ before any modification.\
    \ Entries are append-only \u2014 orchestrator cannot modify past entries. Feeds\
    \ into dashboard changelog view.\n"
  acceptance_criteria:
  - Every orchestrator action produces a changelog entry
  - 'Entry includes: timestamp, intent_id, action_type, description, files_affected,
    reversible, rollback_command'
  - Dashboard displays changelog in reverse chronological order
  - Changelog entries are append-only
  - File backups created before modification in /opt/nexus/automation/backups/
  affected_files:
  - /opt/nexus/automation/logs/changelog.jsonl
  - /opt/nexus/automation/backups/
  - /opt/nexus/automation/planning_engine.py
  - /opt/nexus/dashboard/
  depends_on:
  - np-001
  autonomous: true
  risk: low
  complexity: medium
  tier1_required: false
  status: decomposed
- id: np-004
  category: next_phase
  priority: P2
  title: "Project Knowledge Explorer \u2014 interactive knowledge map"
  description: 'Process every chat transcript and document in the project knowledge
    base. Extract and categorize every concept, decision, architecture detail, and
    implementation status into a structured data store (JSON or SQLite on nexus-admin).
    Build an interactive frontend view in the Command Center for browsing the project
    by domain (blockchain, agents, storage, network, security, ML, quantum, hardware,
    OS layer). Each category shows: key decisions made, current architecture, open
    questions, relevant code paths. Includes search functionality and source attribution
    linking every fact to its origin chat or document. This structured data also serves
    as the foundation for the LoRA training pipeline in np-005.

    '
  acceptance_criteria:
  - Every chat transcript in project knowledge processed and categorized
  - 'Dashboard view with domain categories: blockchain, agents, storage, network,
    security, ML, quantum, hardware, OS'
  - 'Each category shows: decisions, architecture, open questions, code paths'
  - 'Search: type a concept and see every source where it appears with context'
  - 'Source attribution: every fact links back to origin chat or document'
  - 'Visual overview: tree map or card layout showing project scope'
  affected_files:
  - /opt/nexus/automation/knowledge_base/
  - /opt/nexus/dashboard/
  depends_on:
  - np-001
  - ns-003
  autonomous: true
  risk: low
  complexity: high
  tier1_required: false
  status: decomposed
- id: np-005
  category: next_phase
  priority: P2
  title: LoRA fine-tuning pipeline for project-specialized LLM
  description: "Two phases. Phase A \u2014 dataset preparation: take structured knowledge\
    \ from np-004, codebase, smart contracts, agent system prompts, decision logs,\
    \ and architectural decisions. Format into instruction/response training pairs\
    \ (chat fine-tuning format). Minimum 500 high-quality pairs. Phase B \u2014 fine-tuning:\
    \ use Unsloth or PEFT to LoRA fine-tune a base model on the NEXUS dataset. Export\
    \ merged model as GGUF for Ollama. Result: a locally deployable model with deep\
    \ NEXUS architecture knowledge.\n"
  acceptance_criteria:
  - Training script ingests NEXUS dataset and produces LoRA adapter
  - Validation loop measures loss on held-out pairs
  - Checkpoint saving and resumption working
  - Merged or adapter-served model loads in Ollama
  - Training instructions documented in README
  - Dataset versioned in git at /opt/nexus/training/dataset/
  affected_files:
  - /opt/nexus/training/dataset/
  - /opt/nexus/training/scripts/
  depends_on:
  - np-004
  autonomous: true
  risk: medium
  complexity: high
  tier1_required: true
  status: decomposed
- id: np-006
  category: next_phase
  priority: P2
  title: "Interactive planning interface \u2014 live intent registry editor"
  description: 'Add an interactive planning view to the Command Center. Kanban-style
    board or structured form where Md can: add new goals (short-term, long-term, roadmap),
    edit descriptions and acceptance criteria, drag to reprioritize, set dependencies,
    mark items as blocked/approved/completed, add notes. Three horizon columns: This
    Week (next_step), This Month (next_phase), Roadmap. Every change writes back to
    intent_registry.yaml or a SQLite database the orchestrator reads. Changes picked
    up by orchestrator on next planning cycle without restart. This is the direct
    link between Md''s planning and the assistant''s execution.

    '
  acceptance_criteria:
  - Planning view in dashboard with three horizon columns
  - Can create new intents with all required fields
  - Can drag-and-drop to reorder priority within columns
  - Can move items between columns
  - Changes persist immediately to intent registry
  - Orchestrator picks up changes on next cycle without restart
  - Pending approvals visible in dedicated view
  affected_files:
  - /opt/nexus/dashboard/
  - /opt/nexus/automation/intent_registry.yaml
  - /opt/nexus/automation/planning_engine.py
  depends_on:
  - np-001
  - ns-001
  autonomous: true
  risk: medium
  complexity: high
  tier1_required: false
  status: decomposed
- id: rm-001
  category: roadmap
  priority: P3
  title: Action-to-transaction encoding protocol
  description: "Design and implement the encoding standard that converts any system\
    \ action into a structured blockchain transaction the internal system can decode.\
    \ When User 1 does Action X at Time Y, the system encodes: from address (actor\
    \ wallet or agent wallet), to address (target contract \u2014 ActionRegistry),\
    \ data field (ABI-encoded payload with action type, parameters, timestamp), and\
    \ the tx hash becomes the permanent unique receipt. Define 5-10 initial action\
    \ types: user_login, file_access, agent_decision, resource_allocation, config_change.\
    \ Build complete encode/decode cycle. This is the foundational protocol that makes\
    \ blockchain-as-kernel real rather than metaphorical.\n"
  acceptance_criteria:
  - Encoding protocol spec documented with field definitions and ABI format
  - 'Python encoder: action_to_tx(actor, action_type, params) returns signed transaction'
  - 'Python decoder: tx_to_action(tx_hash) returns actor, action_type, params, timestamp'
  - 'Round-trip demo: action > encode > submit > confirm > decode > matches original'
  - 5-10 action types defined with unique type IDs
  affected_files:
  - /opt/nexus/contracts/source/ActionRegistry.sol
  - /opt/nexus/automation/action_encoder.py
  - /opt/nexus/automation/action_decoder.py
  - /opt/nexus/docs/encoding_protocol.md
  depends_on: []
  autonomous: true
  risk: medium
  complexity: medium
  tier1_required: false
  status: decomposed
- id: rm-002
  category: roadmap
  priority: P3
  title: ActionRegistry smart contract
  description: 'Deploy a general-purpose ActionRegistry smart contract on Chain ID
    123454321. Accepts encoded action transactions, indexes by actor address and action
    type, emits events for off-chain indexers. Provides view functions: getActionsByActor(address,
    fromBlock, toBlock) and getActionsByType(uint8, fromBlock, toBlock). Gas-efficient:
    relies on event logs for historical queries, stores only latest state per actor.
    Integrates with existing ECT/RST token contracts. This is the system call table
    of NEXUS OS.

    '
  acceptance_criteria:
  - Contract deployed on Chain ID 123454321
  - Processes 100+ test actions across multiple types and actors
  - Python indexer reconstructs full action history from chain in under 10 seconds
  - Event emissions for all action types verified
  - Gas cost per action under 100k gas
  affected_files:
  - /opt/nexus/contracts/source/ActionRegistry.sol
  - /opt/nexus/contracts/deployed/ActionRegistry.json
  - /opt/nexus/contracts/scripts/deploy_action_registry.py
  - /opt/nexus/contracts/scripts/test_action_registry.py
  depends_on:
  - rm-001
  autonomous: true
  risk: medium
  complexity: medium
  tier1_required: false
  status: decomposed
- id: rm-003
  category: roadmap
  priority: P3
  title: Transaction decoder and internal lookup algorithm
  description: 'Always-running service on the cluster that watches the blockchain
    and maintains a decoded index of all transactions. On each new block: read every
    transaction, identify target contract, decode ABI data, write record to local
    SQLite index. Lookup API answers: What did wallet 0xABC do last hour? Show all
    file_access actions today. Full CEO agent decision history. Which action produced
    tx 0x123? Starts with polling (every 5s matching block period), optimizes to event
    subscriptions later. Feeds into Command Center dashboard for live chain view.

    '
  acceptance_criteria:
  - Decoder service runs continuously as systemd service
  - Processes new blocks in real-time (within 5s of block creation)
  - Lookup API responds to queries with decoded results within 1 second
  - SQLite index stores decoded actions with full metadata
  - Command Center dashboard shows live chain activity in plain language
  affected_files:
  - /opt/nexus/automation/tx_decoder_service.py
  - /opt/nexus/automation/tx_index.db
  - /opt/nexus/dashboard/
  - /etc/systemd/system/nexus-decoder.service
  depends_on:
  - rm-001
  - rm-002
  autonomous: true
  risk: low
  complexity: high
  tier1_required: false
  status: decomposed
- id: rm-004
  category: roadmap
  priority: P3
  title: ECT/RST token integration with action costs
  description: 'Map each action type to its ECT cost and RST stake requirement. Extend
    beyond agent decisions to all system actions. File access: 1 ECT. Config change:
    10 ECT + 100 RST staked. Contract deploy: 50 ECT + 500 RST staked. ActionRegistry
    checks balances before accepting transactions, reverts if actor cannot afford
    it. Creates natural rate limiting, accountability, and economic signal. Token
    economy dashboard in Command Center shows spend rates per agent and per action
    type.

    '
  acceptance_criteria:
  - At least 5 action types have defined ECT costs and RST requirements
  - Insufficient ECT balance causes transaction revert with clear error
  - Token economy view in Command Center shows spend rates per agent and action type
  - RST staking enforced for high-risk actions
  - Daily ECT budget replenishment logic implemented
  affected_files:
  - /opt/nexus/contracts/source/ActionRegistry.sol
  - /opt/nexus/agents/tokens/ect_manager.py
  - /opt/nexus/agents/tokens/rst_manager.py
  - /opt/nexus/dashboard/
  - /opt/nexus/automation/constitution.json
  depends_on:
  - rm-002
  autonomous: true
  risk: high
  complexity: high
  tier1_required: false
  status: decomposed
- id: rm-005
  category: roadmap
  priority: P3
  title: Train abliterated NEXUS LLM with LoRA fine-tuning
  description: 'Train an abliterated base model (uncensored via orthogonal projection
    on residual stream, removing refusal training). Apply LoRA adapters trained on
    NEXUS dataset. Target base: Qwen2.5-7B (Pi deployment) or Qwen2.5-14B (ThinkPad
    deployment). Training on ThinkPad or HuggingFace Spaces. Result: model that understands
    NEXUS OS architecture deeply and does not refuse low-level OS, security, or blockchain
    operations.

    '
  acceptance_criteria:
  - Training dataset of 500+ instruction/response pairs covering all NEXUS domains
  - Abliterated base model responds to all NEXUS queries without refusal
  - LoRA adapter trained and merged or servable as adapter
  - Model correctly answers project-specific questions with higher accuracy than base
  - Model runs in Ollama on target hardware within acceptable latency
  - Adapter and dataset versioned in git for reproducibility
  affected_files:
  - /opt/nexus/training/dataset/
  - /opt/nexus/training/scripts/
  - /opt/nexus/automation/constitution.json
  depends_on:
  - np-004
  autonomous: true
  risk: high
  complexity: very_high
  tier1_required: true
  status: pending
