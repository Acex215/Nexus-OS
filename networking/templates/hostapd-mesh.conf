# NEXUS OS Mesh hostapd configuration
# Adapted from RaspAP hostapd.conf for mesh peering
# Not used directly by BATMAN-adv (uses ibss mode instead)
# This config is for nodes that also need to serve as APs
driver=nl80211
ctrl_interface=/var/run/hostapd
ctrl_interface_group=0
beacon_int=100
auth_algs=1
wpa_key_mgmt=WPA-PSK
ssid=NexusAP
channel=1
hw_mode=g
wpa_passphrase=NexusOSMesh2026
interface=uap0
wpa=2
wpa_pairwise=CCMP
country_code=US
ieee80211n=1
wmm_enabled=1
