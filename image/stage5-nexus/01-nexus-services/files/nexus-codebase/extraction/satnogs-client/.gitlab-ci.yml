---
variables:
  GITLAB_CI_IMAGE_GNURADIO: 'librespace/gnuradio:3.10.5.1-satnogs'
  GITLAB_CI_IMAGE_SENTRY_CLI: 'getsentry/sentry-cli'
  GITLAB_CI_DOCKER_BUILDX_PLATFORMS: 'linux/amd64,linux/arm/v7,linux/arm64'
  GITLAB_CI_DOCKER_IMAGE_NAME: 'satnogs-client'
  GITLAB_CI_DOCKER_PULL: '1'
  GITLAB_CI_DOCKER_IMAGE_TAG_LATEST: '${CI_COMMIT_TAG}'
  GITLAB_CI_APT_PACKAGES: >-
    git
    python3-pip
    python3-venv
  GITLAB_CI_SIGN_OFF_EXCLUDE: 'a3fe97202e64477cc59554f2f76299e41a3113f7'
stages:
  - release
  - static
  - build
  - test
  - deploy
  - sentry_release
  - security

include:
  - template: 'Workflows/MergeRequest-Pipelines.gitlab-ci.yml'
  - template: 'Jobs/Dependency-Scanning.gitlab-ci.yml'
  - template: 'Jobs/SAST.gitlab-ci.yml'
  - template: 'Jobs/Secret-Detection.gitlab-ci.yml'
  - template: 'Jobs/Container-Scanning.gitlab-ci.yml'
  - project: 'librespacefoundation/templates/gitlab-ci'
    ref: '2.0.4'
    file: '.gitlab-ci-release.yml'
  - project: 'librespacefoundation/templates/gitlab-ci'
    ref: '2.0.4'
    file: '.gitlab-ci-sign-off.yml'
  - project: 'librespacefoundation/templates/gitlab-ci'
    ref: '2.0.4'
    file: '.gitlab-ci-docs.yml'
  - project: 'librespacefoundation/templates/gitlab-ci'
    ref: '2.0.4'
    file: '.gitlab-ci-docker.yml'

.default_before_script: &default_before_script
  - apt-get -y update
  - xargs -r -a packages.debian apt-get -qy install $GITLAB_CI_APT_PACKAGES
  - pip install --break-system-packages -cconstraints.txt tox

# 'release' stage
release_notes:
  stage: release
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == 'trigger'
      when: never
    - if: $CI_COMMIT_TAG

release:
  stage: release
  needs:
    - release_notes
  rules:
    - if: $CI_PIPELINE_SOURCE == 'trigger'
      when: never
    - if: $CI_COMMIT_TAG

# 'static' stage
sign_off:
  stage: static
  needs: []

lint:
  stage: static
  needs: []
  image: ${GITLAB_CI_IMAGE_GNURADIO}
  before_script:
    - *default_before_script
  rules:
    - when: never

static:
  stage: static
  needs: []
  image: ${GITLAB_CI_IMAGE_GNURADIO}
  before_script:
    - *default_before_script
  script:
    - tox run -e "flake8,isort,yapf,pylint,robot-lint"

docker_lint:
  stage: static
  needs: []

# 'build' stage
docs:
  stage: build
  needs: []
  image: ${GITLAB_CI_IMAGE_GNURADIO}
  before_script:
    - *default_before_script

build:
  stage: build
  needs: []
  image: ${GITLAB_CI_IMAGE_GNURADIO}
  before_script:
    - *default_before_script
  script:
    - rm -rf dist
    - tox run -e "build"
  artifacts:
    expire_in: 1 week
    when: always
    paths:
      - dist

# 'test' stage
test:
  stage: test
  needs: []
  image: ${GITLAB_CI_IMAGE_GNURADIO}
  before_script:
    - *default_before_script
  script:
    - rm -rf robot/output
    - tox run-parallel -e "pytest,deps,robot"
  artifacts:
    expire_in: 1 week
    when: always
    paths:
      - robot/output

# 'deploy' stage
deploy:
  stage: deploy
  image: ${GITLAB_CI_IMAGE_GNURADIO}
  dependencies: []
  before_script:
    - *default_before_script
  script:
    - rm -rf dist
    - tox run -e "upload"
  rules:
    - if: $CI_PIPELINE_SOURCE == 'trigger'
      when: never
    - if: $CI_COMMIT_TAG && $PYPI_USERNAME && $PYPI_PASSWORD

docker:
  stage: deploy
  dependencies: []
  variables:
    GNURADIO_IMAGE_TAG: '3.10.5.1-satnogs'
    GITLAB_CI_DOCKER_IMAGE_VERSION: '${CI_COMMIT_REF_NAME}'

docker_unstable:
  extends: docker
  variables:
    GNURADIO_IMAGE_TAG: '3.10.5.1-satnogs_unstable'
    GITLAB_CI_DOCKER_IMAGE_VERSION: '${CI_COMMIT_REF_NAME}-unstable'
    GITLAB_CI_DOCKER_IMAGE_TAG_CACHE_NAME: 'cache-unstable'
    GITLAB_CI_DOCKER_IMAGE_TAG_LATEST_NAME: 'unstable'

pages:
  stage: deploy
  rules:
    - if: $CI_PIPELINE_SOURCE == 'trigger'
      when: 'never'
    - if: $CI_COMMIT_TAG && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# 'sentry_release' stage
sentry_release:
  stage: sentry_release
  image: ${GITLAB_CI_IMAGE_SENTRY_CLI}
  script:
    - sentry-cli releases new --finalize -p ${CI_PROJECT_NAME} ${CI_PROJECT_NAME}@${CI_COMMIT_TAG}
    - sentry-cli releases set-commits --auto ${CI_PROJECT_NAME}@${CI_COMMIT_TAG}
  rules:
    - if: $CI_PIPELINE_SOURCE == 'trigger'
      when: 'never'
    - if: $CI_COMMIT_TAG && $SENTRY_AUTH_TOKEN && $SENTRY_ORG

# 'security' stage
dependency_scanning:
  stage: security
  needs: []
  variables:
    DS_MAJOR_VERSION: '6.1.9'
    DS_EXCLUDED_ANALYZERS: 'gemnasium-maven'
gemnasium-python-dependency_scanning:
  before_script:
    - apt-get -y update
    - xargs -r -a packages.debian apt-get -qy install
sast:
  stage: security
  needs: []
secret_detection:
  stage: security
  needs: []
container_scanning:
  stage: security
  needs:
    - job: docker
      artifacts: false
  variables:
    CI_APPLICATION_REPOSITORY: ${CI_REGISTRY_IMAGE}/${GITLAB_CI_DOCKER_IMAGE_NAME}
    CI_APPLICATION_TAG: ${CI_COMMIT_REF_NAME}
  rules:
    - if: $CI_REGISTRY_IMAGE && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
