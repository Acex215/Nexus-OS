  - id: G017
    type: duplicate-code
    severity: P2
    status: open
    title: "backup_file() duplicated with diverged logic"
    description: >
      dev_orchestrator.py has backup_file() using simple shutil.copy().
      execution_engine.py has backup_file() using a manifest + rollback tracking.
      When orchestrator calls its own version, no rollback manifest is created, making
      execution_engine.rollback_plan() unable to restore those files. Safety-critical
      duplication with different behavior.
    affected_components:
      - caf-orchestrator
    affected_files:
      - /opt/nexus/automation/dev_orchestrator.py
      - /opt/nexus/automation/execution_engine.py
    fix: >
      Delete backup_file() from dev_orchestrator.py.
      All callers → execution_engine.backup_file() which creates the manifest.
    estimated_effort: "1-2 hours"

  - id: G018
    type: duplicate-code
    severity: P2
    status: open
    title: "is_protected() duplicated with different matching logic"
    description: >
      dev_orchestrator.py: is_protected() uses glob pattern matching.
      build_world_model.py: is_protected() uses name + extension set comparison.
      Same function name, same intent, different logic — gives different answers for
      the same path depending on which module evaluates it.
    affected_components:
