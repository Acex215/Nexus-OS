    fix: >
      Create /etc/systemd/system/nexus-hierarchy.service:
        [Service]
        ExecStart=/path/to/python hierarchy_manager.py (with correct Python env)
        Restart=on-failure
        StartLimitBurst=3
        StartLimitIntervalSec=60
    estimated_effort: "30 minutes"

  - id: G010
    type: config
    severity: P1
    status: open
    title: "nexus-admin IPFS has 0 swarm peers — no cluster redundancy"
    description: >
      IPFS on nexus-admin (10.0.10.5) has no swarm peers connected. File uploads
      from nexus-admin succeed locally but are not pinned/replicated to other nodes.
      NexusStorage.upload_file() will appear to succeed but the file only exists
      on nexus-admin's 15G IPFS store with no redundancy.
    affected_components:
      - ipfs-storage
    affected_files: []
    fix: >
      Run on nexus-admin:
        ipfs bootstrap rm --all
        ipfs bootstrap add /ip4/10.0.20.3/tcp/4001/p2p/12D3KooWFmWdJWuYt5RLW89qWT3MjNnBbSEw7hKQpGUuMSbXzgFx
        ipfs bootstrap add /ip4/10.0.20.4/tcp/4001/p2p/12D3KooWFj5VeXvu6Aagr9ehpL3qsmtNBxTzzwkJSaYubauhEGzX
        ipfs bootstrap add /ip4/10.0.20.11/tcp/4001/p2p/12D3KooWPjmi4v4yEx8WX1Qs3z4xzJoWPqJkkQZ13Khu2q61VmsX
        sudo systemctl restart ipfs
        ipfs swarm connect /ip4/10.0.20.3/tcp/4001/p2p/12D3KooWFmWdJWuYt5RLW89qWT3MjNnBbSEw7hKQpGUuMSbXzgFx
    estimated_effort: "5 commands, 5 minutes"

  - id: G011
    type: process
    severity: P1
    status: open
    title: "CAF orchestrator infinite retry loop: np-005.1.1 uses blocked wget"
    description: >
      Intent np-005.1.1 (Data Collection and Preparation) has been cycling since Mar 8.
      Each 30-minute cycle: LLM generates plan → plan uses wget → guardrail blocks wget
      → marked blocked_for_approval → 30 minutes later, rescheduled. Depth limit resets
      on reschedule. No Discord escalation. Loop burns HuggingFace API quota continuously.
      As of 2026-03-09 the orchestrator process is inactive (killed), so the loop is
      paused but not resolved.
    affected_components:
      - caf-orchestrator
    affected_files:
      - /opt/nexus/automation/intent_registry.yaml
    fix: >
      Set np-005.1.1 status to "blocked_human" in intent_registry.yaml before restarting
      the orchestrator. Then redesign the task to use allowed download methods.
    estimated_effort: "1 YAML edit, 5 minutes"
    notes: "Orchestrator currently inactive (PID 2374 killed) so no immediate action needed — fix before restart."

  - id: G012
    type: missing-implementation
    severity: P1
    status: open
    title: "Webhook fallback agents permanently non-functional (5 of 30)"
    description: >
      5 agents (including ml_worker_3) have token='WEBHOOK_FALLBACK' in agent_registry.
      hierarchy_manager.py:153-157: if is_webhook=True, skip NexusAgentWorkflow creation
      and skip client start. These agents have no LLM workflow and cannot respond to
      any Discord message. They are permanently silent. No webhook_url is configured.
    affected_components:
      - ai-agent-hierarchy
      - discord-comms
    affected_files:
      - /opt/nexus/agents/hierarchy_manager.py:145-157
    fix: >
      Option A: Assign real Discord bot tokens to the 5 webhook agents.
      Option B: Accept 25/30 bots and remove webhook agent entries from agent_registry.
      Option C: Implement actual webhook_url-based posting for these 5 agents.
    estimated_effort: "Option B: 30 minutes; Option A/C: 2-4 hours"

  - id: G013
    type: process
    severity: P1
    status: open
    title: "Agent delegation is cosmetic — no routing between agents"
    description: >
      CEO and COO bots can decide to 'delegate' tasks via the delegates_to field in
      their LLM JSON output. However, hierarchy_manager.py never reads this field and
      never routes messages to sub-agent channels. Delegation is a string in an LLM
      response that no code acts on. The hierarchy is structurally flat despite the
      30-agent corporate org chart.
    affected_components:
      - ai-agent-hierarchy
    affected_files:
      - /opt/nexus/agents/hierarchy_manager.py
      - /opt/nexus/agents/agent_workflow.py
    fix: >
      In _finalize() or equivalent, after LLM decision is generated:
        if decision.get('delegates_to'):
          for agent_id in decision['delegates_to']:
            channel = AGENT_CHANNEL_MAP[agent_id]
            await channel.send(task_message)
      Requires AGENT_CHANNEL_MAP to be populated with resolved TextChannel objects.
    estimated_effort: "4-8 hours"

  - id: G014
    type: process
    severity: P1
    status: open
    title: "CAF phantom success: no post-execution file existence verification"
    description: >
      dev_orchestrator.py does not verify that files claimed in plan.files_modified
      actually exist after execution. Task np-001.3 produced an empty git commit and
      logged success=True with files_modified=['/opt/nexus/dashboard/backend/data_sources.py'].
      The file does not exist. The audit trail has a false entry. No mechanism catches this.
    affected_components:
      - caf-orchestrator
    affected_files:
      - /opt/nexus/automation/dev_orchestrator.py
      - /opt/nexus/automation/execution_engine.py
    fix: >
      After each task execution, before writing audit entry:
        for filepath in plan.get('files_modified', []):
          assert os.path.exists(filepath), f"Claimed file not found: {filepath}"
        assert git_diff_is_nonempty(), "Empty commit — plan produced no changes"
      If either check fails: mark task FAILED, initiate rollback, log to audit.jsonl.
    estimated_effort: "2-4 hours"

  - id: G015
    type: process
    severity: P1
    status: open
    title: "No merge gate — agent branches are never reviewed or merged"
    description: >
      The CAF orchestrator creates auto/ branches for every task. Even for successful
      tasks, there is no mechanism to merge branches back to main. All agent-written
      code accumulates in orphaned branches. If the agent creates genuinely useful code,
      it will never ship.
    affected_components:
      - caf-orchestrator
    affected_files:
      - /opt/nexus/automation/dev_orchestrator.py
    fix: >
      After post-execution validation passes:
        request_approval(intent_id, branch_summary) → wait for ✅/❌
        ✅ → git merge auto/<branch> into main; intent → MERGED
        ❌ → git branch -d auto/<branch>; intent → ABANDONED
    estimated_effort: "4-8 hours"

  - id: G016
    type: process
    severity: P1
    status: open
    title: "No human escalation after repeated failure — silent infinite retry"
    description: >
      After depth_limit retries fail, intent is rescheduled with no backoff and no
      Discord notification. The operator has no visibility into stuck intents. This
      is the structural cause of the np-005.1.1 infinite loop (G011).
    affected_components:
      - caf-orchestrator
    affected_files:
      - /opt/nexus/automation/dev_orchestrator.py
      - /opt/nexus/automation/failure_analyzer.py
    fix: >
      After retry_count >= 3 (or same root_cause appears twice):
        set intent status = BLOCKED_HUMAN
        send Discord notification: "Intent <id> blocked after <n> retries: <reason>"
        Do not reschedule. Require explicit Discord command "!unblock <intent_id>" to reset.
    estimated_effort: "2-4 hours"

  # ─────────────────────────────────────────────────────────────────
