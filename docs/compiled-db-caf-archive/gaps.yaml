    title: "_strip_json() copy-pasted between feedback_loop.py and task_planner.py"
    description: >
      Identical implementation in two files. If one is fixed for an edge case, the
      other will still have the bug. LLM JSON parsing is a common failure point.
    affected_components:
      - caf-orchestrator
    affected_files:
      - /opt/nexus/automation/feedback_loop.py
      - /opt/nexus/automation/task_planner.py
    fix: "Extract to automation/utils.py or guardrails.py, import from both callers."
    estimated_effort: "30 minutes"

  - id: G020
    type: duplicate-code
    severity: P2
    status: open
    title: "LLM routing duplicated: llm_router.py (OpenAI API) vs subagent_client.py (Ollama native)"
    description: >
      Both files target nexus-master:11434 (Tier 3/subagent). llm_router.py uses
      OpenAI-compatible format; subagent_client.py uses Ollama native API format.
      Inconsistent API schemas for the same endpoint. One will break if Ollama changes
      its API compatibility layer.
    affected_components:
      - caf-orchestrator
      - llm-inference
    affected_files:
      - /opt/nexus/automation/llm_router.py
      - /opt/nexus/automation/subagent_client.py
    fix: "Consolidate — subagent_client.py should use llm_router.py's Tier3 path."
    estimated_effort: "2-3 hours"

  - id: G021
    type: process
    severity: P2
    status: open
    title: "seed_knowledge.py executes ChromaDB writes on import (no __main__ guard)"
    description: >
      automation/seed_knowledge.py has top-level code that runs outside any function.
      Importing this module (e.g. accidentally by the orchestrator or during indexing)
      triggers ChromaDB writes. No current code imports it, but the risk grows as the
      codebase is extended.
    affected_components:
      - chromadb-knowledge
    affected_files:
      - /opt/nexus/automation/seed_knowledge.py
    fix: "Wrap top-level code in: if __name__ == '__main__':"
    estimated_effort: "1 line, 5 minutes"

  - id: G022
    type: process
    severity: P2
    status: open
    title: "automation/ entirely untracked in git"
    description: >
      The entire CAF orchestrator — dev_orchestrator.py, intent_registry.yaml, all
      automation/*.py files, and orchestrator logs — is UNTRACKED in git. No commit
      history, no rollback capability, no version tracking for the system that
      autonomously manages everything else. A disk failure or accidental rm -rf would
      permanently destroy the orchestrator.
    affected_components:
      - caf-orchestrator
    affected_files:
      - /opt/nexus/automation/ (entire directory — 55KB orchestrator + 42KB intent registry)
    fix: >
      cd /opt/nexus && git add automation/ && git commit -m "chore: track automation/ in git"
      Note: intent_registry.yaml should be added to .gitignore or tracked with care
      (it contains runtime state that changes frequently; commit the initial version
      then add to .gitignore for runtime changes).
    estimated_effort: "30 minutes"

  - id: G023
    type: process
    severity: P2
    status: open
    title: "22 stale auto/ git branches from failed orchestrator attempts"
    description: >
      The orchestrator created 22 auto/ branches (e.g. auto/np-004-1-f2-2-1772849379).
      None have been merged. All represent failed or abandoned tasks. They confuse
      git branch output and consume disk. At current rate, the repo will have hundreds
      of branches within weeks if the orchestrator resumes work.
    affected_components:
      - caf-orchestrator
    affected_files: []
    fix: >
      git branch | grep 'auto/' | xargs git branch -D
      (Verify no branch has unreviewd useful work first — check git log auto/<branch>)
    estimated_effort: "15 minutes"
    notes: "Currently on auto/np-004-1-f2-2-1772849379 (G024 below). Fix G024 first."

  - id: G024
    type: process
    severity: P2
    status: open
    title: "git working directory is on agent branch, not main"
    description: >
      /opt/nexus is currently checked out on auto/np-004-1-f2-2-1772849379.
      Every git status, git diff, git log shows branch-relative state.
      Developers will not see main's state. Any work committed here adds to an
      orphaned branch, not main.
    affected_components:
      - caf-orchestrator
    affected_files: []
    fix: "cd /opt/nexus && git checkout main"
    estimated_effort: "1 command, 10 seconds"
    notes: "Do this FIRST before any other git operations."

  - id: G025
    type: process
    severity: P2
    status: open
    title: "nexus-orchestrator.service has no restart rate cap"
    description: >
      /etc/systemd/system/nexus-orchestrator.service has Restart=on-failure but no
      StartLimitBurst or StartLimitIntervalSec. If the orchestrator crashes in a loop
      (e.g. import error after a bad code change), systemd restarts it indefinitely,
      burning HuggingFace API quota and consuming system resources.
    affected_components:
      - caf-orchestrator
    affected_files:
      - /etc/systemd/system/nexus-orchestrator.service
    fix: >
      Add to [Service]:
        StartLimitBurst=3
        StartLimitIntervalSec=60
    estimated_effort: "2 lines, 5 minutes"

  - id: G026
    type: security
    severity: P2
    status: open
    title: "ChromaDB exposed on 0.0.0.0:8000 with no authentication"
    description: >
      chromadb.service starts with --host 0.0.0.0 --port 8000. Any host that can
      reach nexus-admin port 8000 can read and write ALL ChromaDB collections, including
      session_transcripts and nexus_decisions. No authentication is configured in
      ChromaDB 1.5.2. All orchestrator memory and session history is publicly readable
      within the VLAN.
    affected_components:
      - chromadb-knowledge
    affected_files:
      - /etc/systemd/system/chromadb.service
    fix: >
      Option A: bind to localhost only (--host 127.0.0.1) if only local access needed.
      Option B: add iptables rule on nexus-admin to allow port 8000 only from cluster IPs.
      Option C: Enable ChromaDB auth token (requires chromadb ≥1.0.0 auth config).
    estimated_effort: "Option A: 5 minutes; Option B: 15 minutes"

  - id: G027
    type: security
    severity: P2
    status: open
    title: "discord_comms.py: any Discord guild member can trigger orchestrator actions"
    description: >
      automation/discord_comms.py processes commands from any message in the CAF channel.
      No user role or ID check is performed. Any guild member who can write in the
      CAF channel can trigger orchestrator task creation, approval grants, or other
      high-privilege actions.
    affected_components:
      - caf-orchestrator
