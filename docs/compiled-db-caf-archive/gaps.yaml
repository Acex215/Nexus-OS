# NEXUS OS Gap Registry
# Generated: 2026-03-09
# Source: 06-consolidated-diagnosis.md + live code inspection + compiled-db cross-reference
#
# The agent MUST check this file before any task.
# Rule: Never start work on a component with an open P0 gap without resolving that gap first.
# Rule: Never modify a file listed in an open gap without reading the gap entry first.
#
# Severity: P0=system-won't-start, P1=feature-broken, P2=technical-debt, P3=cosmetic
# Status: open | resolved | wont-fix
# Type: stale-ip | dead-code | missing-implementation | security | duplicate-code |
#        documentation-drift | process | phantom-success | config | dependency

gaps:

  # ─────────────────────────────────────────────────────────────────
  # P0 — SYSTEM WON'T START
  # ─────────────────────────────────────────────────────────────────

  - id: G001
    type: stale-ip
    severity: P0
    status: open
    title: "blockchain_logger.py has pre-VLAN RPC URL"
    description: >
      agents/blockchain_logger.py:27 sets RPC_URL = "http://192.168.8.228:8545".
      192.168.8.228 was nexus-master's pre-VLAN IP. After the Feb 2026 VLAN migration
      the IP became 10.0.20.3. Every agent decision silently fails to log on-chain.
      No new ReasoningLedger entries have been written since Feb 17, 2026.
    affected_components:
      - blockchain-logging
      - ai-agent-hierarchy
    affected_files:
      - /opt/nexus/agents/blockchain_logger.py:27
    fix: >
      Change RPC_URL = "http://192.168.8.228:8545"
      To:   RPC_URL = "http://10.0.20.3:8545"
    estimated_effort: "1 line, 30 seconds"
    notes: "All blockchain transparency guarantees are void until this is fixed."

  - id: G002
    type: stale-ip
    severity: P0
    status: open
    title: "llm_client.py has pre-VLAN local inference URL"
    description: >
      agents/llm_client.py:19 sets LOCAL_INFERENCE_URL = "http://192.168.8.128:8090/v1/chat/completions".
      192.168.8.128 was nexus-ai's pre-VLAN IP. Correct is 10.0.20.4. All worker agent
      LLM calls fall back to HuggingFace API (burning quota) instead of using free local inference.
      SmolLM2-1.7B is running on nexus-ai and receiving zero requests.
    affected_components:
      - llm-inference
      - ai-agent-hierarchy
    affected_files:
      - /opt/nexus/agents/llm_client.py:19
    fix: >
      Change LOCAL_INFERENCE_URL = "http://192.168.8.128:8090/v1/chat/completions"
      To:   LOCAL_INFERENCE_URL = "http://10.0.20.4:8090/v1/chat/completions"
      ALSO requires G003 (iptables fix on nexus-ai) to take effect.
    estimated_effort: "1 line, 30 seconds + iptables fix"
    notes: "Fix G002 and G003 together — neither alone is sufficient."

  - id: G003
    type: config
    severity: P0
    status: open
    title: "nexus-ai iptables blocks port 8090 from nexus-admin"
    description: >
      Even after fixing llm_client.py URL (G002), port 8090 is not in nexus-ai's
      INPUT chain for nexus-admin (10.0.10.5) or the WireGuard subnet (10.1.0.0/24).
      Both fixes are required together to restore local LLM inference for agents.
    affected_components:
      - llm-inference
    affected_files: []
    fix: >
      Run on nexus-ai (ssh mhuraibi@10.0.20.4):
        sudo iptables -I INPUT 9 -p tcp -s 10.0.10.5 --dport 8090 -j ACCEPT
        sudo iptables -I INPUT 10 -p tcp -s 10.1.0.0/24 --dport 8090 -j ACCEPT
        sudo netfilter-persistent save
    estimated_effort: "3 commands, 2 minutes"

  - id: G004
    type: dependency
    severity: P0
    status: open
    title: "hierarchy_manager.py: langgraph and web3 not in system Python"
    description: >
      hierarchy_manager.py imports agent_workflow which imports langgraph. web3 is also
      required by blockchain_logger.py. Both are in /opt/nexus/contracts/.venv but NOT
      in system Python. The nexus-orchestrator.service uses system Python and works fine.
      But hierarchy_manager.py is started manually or by the orchestrator — it crashes
      immediately at import with ModuleNotFoundError. ALL 30 Discord bots are down.
    affected_components:
      - ai-agent-hierarchy
    affected_files:
      - /opt/nexus/agents/hierarchy_manager.py
      - /opt/nexus/agents/agent_workflow.py
    fix: >
      Option A (simplest): pip3 install langgraph web3 (installs to system Python)
      Option B (clean): create /etc/systemd/system/nexus-hierarchy.service that
        activates .venv before running hierarchy_manager.py (similar to .venv
        usage in nexus-dashboard.service)
    estimated_effort: "Option A: 1 command, 5 minutes; Option B: 30 minutes"
    notes: "langgraph confirmed installed per components.yaml validation — verify before treating as open."

  - id: G005
    type: dead-code
    severity: P0
    status: open
    title: "services/ subtree: plinth/django/augeas not installed (27 dead files)"
    description: >
      39 files in services/{backups,firewall,networks,storage}/ and core/action_utils.py
      all import plinth, django, or augeas — none installed on this system.
      No NEXUS code calls any of these modules. They are completely inoperable.
