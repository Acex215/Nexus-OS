  - id: G009
    type: process
    severity: P1
    status: open
    title: "ai-agent-hierarchy has no systemd service — manual start only"
    description: >
      hierarchy_manager.py must be started manually with the correct Python environment.
      There is no systemd service managing it. If nexus-admin reboots, the agent hierarchy
