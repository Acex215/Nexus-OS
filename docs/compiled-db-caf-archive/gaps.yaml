    affected_components:
      - services-freedombox
    affected_files:
      - /opt/nexus/core/action_utils.py
      - /opt/nexus/services/firewall/ (9 files)
      - /opt/nexus/services/networks/ (7 files)
      - /opt/nexus/services/storage/ (10 files)
    fix: >
      Option A: git rm -r services/ core/action_utils.py (archive first to branch)
      Option B: wont-fix (accept dead code in repo; no functional impact)
    estimated_effort: "1 git command + verification, 15 minutes"
    notes: "No functional impact either way — nothing calls these modules."

