      infra_configs, session_transcripts, web_research.
      world_model.db at /mnt/nexus-nas/knowledge/world_model.db (NFS).

  - id: D025
    date: "2026-02"
    topic: caf-human-in-loop
    decision: "Discord as human-in-the-loop channel: orchestrator requests approval for risky changes"
    rationale: >
      Fully autonomous systems that modify their own infrastructure are dangerous.
      Discord provides a low-friction approval channel — the orchestrator sends a message
      and waits for human approval before executing service changes or contract deployments.
      intent_parser.py handles approve/retry/skip/block/pause commands.
