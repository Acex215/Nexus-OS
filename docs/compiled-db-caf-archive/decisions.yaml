  - id: D009
    date: "2026-02"
    topic: vlan-topology
    decision: "3-VLAN air-gapped topology: VLAN 20 (cluster, no internet), VLAN 10 (admin), VLAN 30 (dev)"
    rationale: >
      VLAN 20 (10.0.20.0/24) holds all validator nodes — isolated from internet for security.
      VLAN 10 (10.0.10.0/24) holds nexus-admin which has internet access for API calls.
      VLAN 30 (10.0.30.0/24) holds the ThinkPad dev machine, blocked from routing to VLAN 20
      via iptables on nexus-admin. Prevents ThinkPad from directly reaching validators.
    implemented_in:
      - /opt/nexus/automation/constitution.json
      - /opt/nexus/automation/guardrails.py
    status: active
    notes: >
      constitution.json: "no_internet_from_cluster: Never attempt to route VLAN 20 traffic
      to internet." iptables FORWARD DROP 10.0.30.0/24→10.0.20.0/24 on nexus-admin.
      Migration from flat 192.168.8.x network completed Feb 2026.

  - id: D010
    date: "2026-02"
    topic: network-resilience
    decision: "5-level network degradation with automatic layer switching"
    rationale: >
      Single-path networking creates a hard dependency. Pi cluster nodes may lose Ethernet
      temporarily. Degradation chain provides increasingly limited but still functional
      connectivity: Ethernet (full) → BATMAN-adv WiFi mesh (~50Mbps) → WireGuard overlay
      (encrypted tunnel) → Sub-GHz RF via Flipper Zero (64B/packet, ~1kbps) → BLE (discovery).
    implemented_in:
      - /opt/nexus/networking/degradation_manager.py
      - /opt/nexus/networking/setup_wireguard.sh
      - /opt/nexus/networking/setup_mesh.sh
      - /opt/nexus/networking/flipper_bridge.py
      - /opt/nexus/networking/rf_relay.py
      - /opt/nexus/networking/rf_mesh_daemon.py
    status: partial
    notes: >
      WireGuard (Level 3) active on nexus-admin (nexus-mesh, 10.1.0.4/24).
      BATMAN-adv (Level 2) module loaded but bat0 not active on nexus-admin.
      RF (Level 4): code complete, no Flipper Zero connected on admin.
      BLE (Level 5): listed in constitution as "future."

  - id: D011
    date: "2026-02"
    topic: mesh-networking-protocol
    decision: "BATMAN-adv over WiFi IBSS (ad-hoc) at 2.4GHz channel 1 for Layer 2 mesh"
    rationale: >
      BATMAN-adv (Better Approach To Mobile Adhoc Networking) provides transparent
      Layer 2 bridging over WiFi ad-hoc (IBSS) mode without infrastructure AP.
      All Pi 5 nodes have brcmfmac WiFi supporting IBSS. Mesh IP 10.0.0.X/24.
    implemented_in:
      - /opt/nexus/networking/setup_mesh.sh
    status: partial
    notes: >
      batman_adv kernel module loaded on nexus-admin. No bat0 interface active.
      rfkill must be unblocked before setup. Mesh IPs: master=.1, ai=.2, storage=.3, admin=.4.

  - id: D012
    date: "2026-02"
    topic: rf-fallback-hardware
    decision: "Flipper Zero as Sub-GHz RF bridge (433.92MHz, 64-byte KISS-framed packets)"
    rationale: >
      Sub-GHz RF provides last-resort connectivity when all IP paths fail. Flipper Zero
      provides a programmable software-defined radio accessible via USB serial. 433MHz
      penetrates walls better than 2.4GHz. KISS framing adapted from SatNOGS.
      Packet format: 4B magic + 20B sender + 20B recipient + metadata + 18B payload.
    implemented_in:
      - /opt/nexus/networking/flipper_bridge.py
      - /opt/nexus/networking/rf_relay.py
      - /opt/nexus/networking/rf_mesh_daemon.py
    status: partial
    notes: "Code complete. No Flipper Zero connected on nexus-admin. --mock flag for testing."

  - id: D013
    date: "2026-02"
    topic: mesh-peer-registration
    decision: "MeshRegistry smart contract for on-chain WireGuard peer discovery"
    rationale: >
      WireGuard peers need public keys, IPs, and enode URLs. Storing these on-chain
      gives each node a cryptographically verifiable, tamper-resistant peer registry
      that doesn't depend on a central coordinator. mesh_discovery.py reads events
      to auto-configure WireGuard when new nodes register.
    implemented_in:
      - /opt/nexus/contracts/source/MeshRegistry.sol
      - /opt/nexus/contracts/deployed/MeshRegistry.json
      - /opt/nexus/networking/mesh_discovery.py
    status: operational
    notes: "Contract at 0x21e5...A26F (block 1717). mesh_discovery.py watches PeerRegistered events."

