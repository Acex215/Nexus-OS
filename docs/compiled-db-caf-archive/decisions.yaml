  # SERVICES — FreedomBox Integration
  # ════════════════════════════════════════════════════════════════

  - id: D033
    date: "2026-02"
    topic: service-management-framework
    decision: "Adapt FreedomBox Plinth service framework for NEXUS service management"
    rationale: >
      FreedomBox has mature service lifecycle management (start/stop/configure/backup).
      Rather than building from scratch, extract firewall, networks, and storage modules.
      Replace Django ORM with SQLite, replace Django views with FastAPI.
    implemented_in:
      - /opt/nexus/core/service_framework.py
    status: superseded
    notes: >
      OUTCOME: Only core/service_framework.py was successfully adapted (331 lines, operational).
      The services/ modules (27 files) are DEAD — they still import plinth/django/augeas
      which are not installed. The clean rewrite (service_framework.py) is the survivor.
      core/action_utils.py (850 lines) also dead (imports augeas).
      Superseded by the FastAPI+SQLite pattern in service_framework.py.

  # ════════════════════════════════════════════════════════════════
  # DESIGN PRINCIPLES — Constitution
  # ════════════════════════════════════════════════════════════════

  - id: D034
    date: "2025-Q4"
    topic: identity-principle
    decision: "Blockchain IS the kernel — Geth starts before all other services"
    rationale: >
      This is the foundational design principle of NEXUS OS. All other services depend
      on the chain for identity, coordination, and audit. Making Geth a hard dependency
      (not an optional service) enforces this principle architecturally.
    implemented_in:
      - /opt/nexus/automation/constitution.json
      - /opt/nexus/core/service_framework.py
    status: active
    notes: "constitution.json principle 1. ServiceRegistry on-chain anchoring in service_framework.py."

  - id: D035
    date: "2025-Q4"
    topic: hardware-identity
    decision: "Every device = Ethereum wallet. Hardware identity is cryptographic."
    rationale: >
      Wallets provide unique, unforgeable identity for each node without a central
      identity authority. ResourceManager.registerNode() anchors hostname + capabilities
      to a wallet address. All agent decisions are attributed to the deployer wallet.
    implemented_in:
      - /opt/nexus/contracts/source/ResourceManager.sol
      - /opt/nexus/libnexus/kernel.py
      - /opt/nexus/scripts/register_nodes.py
    status: active
    notes: "constitution.json principle 2. Deployer: 0x817B...958. Validators have their own wallets."

  - id: D036
    date: "2026-02"
    topic: planned-but-not-implemented
    decision: "Temporal binning (8,760 hourly bins), homomorphic encryption, differential privacy listed in constitution"
    rationale: >
      Constitution lists these as design principles: temporal binning as universal
      scheduling abstraction, privacy by design (daily encryption rotation, homomorphic
      encryption, differential privacy). These represent intended future architecture.
    implemented_in: []
    status: planned
    notes: >
      Zero code implements any of these. No temporal binning in any Python file.
      No homomorphic encryption library imported. No differential privacy mechanism.
      SmolAgents ("SmolAgents for narrow execution" in constitution) also not implemented —
      only LangGraph exists in the codebase. These are aspirational architecture notes
      in constitution.json, not active decisions.
