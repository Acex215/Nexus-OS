    topic: caf-architecture
    decision: "Planner-executor separation: deterministic planning from intent registry, LLM-generated execution plans"
    rationale: >
      Having LLM choose WHAT to work on next causes hallucination and scope creep.
      planning_engine.py selects from intent_registry.yaml deterministically (priority,
      deps, status). The LLM is only used to decide HOW to execute — generating structured
      JSON execution plans in task_planner.py. This keeps strategy human-controlled
      and execution AI-assisted.
    implemented_in:
      - /opt/nexus/automation/planning_engine.py
      - /opt/nexus/automation/task_planner.py
      - /opt/nexus/automation/intent_registry.yaml
      - /opt/nexus/automation/dev_orchestrator.py
    status: active
    notes: >
      intent_registry.yaml is a protected file — only update_intent_status() may write it.
      1240-line registry with P0-P3 priorities. orchestrator.service was running for
      3d 12h before SIGTERM at 2026-03-09 10:23 EDT.

  - id: D023
    date: "2026-02"
    topic: caf-safety
    decision: "Git branch isolation: all autonomous changes on auto/* branches, never to main"
    rationale: >
      Autonomous code changes to main branch would be irreversible and hard to audit.
      auto/* branches provide a review checkpoint for every CAF-generated change.
      execution_engine.py creates branch auto/{intent_id}-{timestamp}, makes changes,
      commits, then returns to main. Allows human review before merging.
    implemented_in:
      - /opt/nexus/automation/execution_engine.py
      - /opt/nexus/automation/guardrails.py
    status: active
    notes: >
      14+ auto/* branches created by CAF visible in git log (ns-004-1-*, rm-001-*, etc.).
      EXECUTION_POLICIES["git_workflow"]: "All changes on auto/* branches. Never commit to main."
      File backup to /opt/nexus/backups/auto/ before any modification.

  - id: D024
    date: "2026-02"
    topic: caf-memory
    decision: "Three-tier memory: ChromaDB (semantic, persistent) + SQLite world model (structured) + constitution (always-present)"
    rationale: >
      LLM context windows are limited. Three tiers provide: Tier 0 (constitution, ~600 tokens,
      always injected — identity, principles, topology), Tier 1 (ChromaDB semantic search
      on code/docs/decisions, ~2000-4000 tokens), Tier 2 (background context, ~1000-2000 tokens).
