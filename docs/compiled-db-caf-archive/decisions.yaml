  # BLOCKCHAIN — Consensus and Chain Design
  # ════════════════════════════════════════════════════════════════

  - id: D001
    date: "2025-Q4"
    topic: consensus-algorithm
    decision: "Clique Proof-of-Authority with 3 validators and Chain ID 123454321"
    rationale: >
      PoW is infeasible on Raspberry Pi 5 hardware. PoS requires staking infrastructure.
      Clique PoA provides instant finality with minimal overhead. 3 validators satisfies
      N/2+1 = 2 signing threshold for Clique, giving fault tolerance for one validator
      going offline. Private chain ID 123454321 prevents replay attacks vs public chains.
    implemented_in:
      - /opt/nexus/contracts/genesis-fast-test.json
      - "nexus-master:/opt/nexus/blockchain/genesis.json (remote)"
    status: active
    notes: "All 3 validators live at block 1720. 2 peers each. Geth 1.13.15-stable."

  - id: D002
    date: "2026-02"
    topic: block-sealing-period
    decision: "Migrate from period=5 to period=0 (on-demand sealing) via chain reinit"
    rationale: >
      period=5 produced 17,280 empty blocks/day (~1,279 MB disk/day at idle),
      and had 14,204ms mean confirmation time. period=0 seals only on pending
      transactions, giving ~102ms confirmation, zero empty blocks, zero idle disk
      growth. Required full chain reinit (clean slate) — not an in-place upgrade.
    implemented_in:
      - "nexus-master:/opt/nexus/blockchain/genesis.json (remote)"
      - /opt/nexus/contracts/genesis-fast-test.json
    status: active
    supersedes: "period=5 chain (genesis-original-backup.json archived on nexus-master)"
    notes: >
      Current block 1720 reflects post-reinit chain. 19 ReasoningLedger entries
      re-imported from backup after reinit. All contracts redeployed.
      constitution.json: "Block period=0 gives on-demand sealing (~102ms confirmation)."

  - id: D003
    date: "2025-Q4"
    topic: gas-pricing
    decision: "Zero gas price on private chain (gasPrice=0, gas limit 30,000,000)"
    rationale: >
      Private chain serves internal system calls only. No economic reason for gas fees.
      Zero fees simplify all contract interaction code (no ETH balance management,
      no fee estimation). High gas limit accommodates complex contract operations.
    implemented_in:
      - /opt/nexus/libnexus/kernel.py
      - /opt/nexus/agents/blockchain_logger.py
    status: active
    notes: "Deployer balance ~999.99 ETH (pre-allocated in genesis). transact() calls omit gasPrice."

  - id: D004
    date: "2026-02"
    topic: transaction-signing
    decision: "Migrate from --allow-insecure-unlock to Clef external signer via IPC"
    rationale: >
      Geth deprecated --allow-insecure-unlock in production configs. Clef provides
      hardware-local key custody with rules.js for auto-approving Clique block signing
      and known contract transactions. Wallet never exposed to application layer.
      Python code calls .transact({'from': wallet}) which Geth forwards to Clef via IPC.
    implemented_in:
      - /home/mhuraibi/nexus/phase4/security/clef/rules.js
      - /home/mhuraibi/nexus/phase4/security/clef/clef-wrapper.py
      - /home/mhuraibi/nexus/phase4/security/clef/migrate_to_clef.sh
    status: active
    notes: >
      Deployed on all 3 validators Feb 2026. Clef --ipcpath takes a DIRECTORY
      (appends clef.ipc automatically). Password file must be mode 0400.
      After any rules.js edit: re-attest sha256 + restart clef + geth.
      4byte-custom.json must list all contract function selectors or signing fails.

  # ════════════════════════════════════════════════════════════════
  # STORAGE — Data Architecture
  # ════════════════════════════════════════════════════════════════

  - id: D005
    date: "2025-Q4"
    topic: storage-architecture
    decision: "Blockchain stores metadata only; IPFS stores data"
    rationale: >
      Blockchain is designed for small, trustless state — not GB-scale files.
      IPFS provides content-addressed, deduplicated, distributed file storage.
      The separation gives fast blockchain operations (small txns), scalable storage,
      and cryptographic integrity via CID + Merkle proofs on-chain.
    implemented_in:
      - /opt/nexus/libnexus/nexus_storage.py
      - /opt/nexus/contracts/source/StorageRegistry.sol
      - /opt/nexus/contracts/deployed/StorageRegistry.json
    status: active
    notes: >
      constitution.json: "Blockchain stores metadata. IPFS stores data."
      Data flow: File → IPFS (CID) → StorageRegistry.registerFile(CID, merkleRoot, ...)
      IPFS chunk size 256KB. 50MB file = 203 blocks. Retrieved at ~12-33 MB/s cross-node.

  - id: D006
    date: "2025-Q4"
    topic: ipfs-isolation
    decision: "Private IPFS cluster with swarm.key (fully isolated from public IPFS)"
    rationale: >
      Public IPFS would expose cluster data, leak topology, and create bandwidth
      pressure from external peers. Private swarm.key ensures all IPFS traffic
      stays within the cluster network.
    implemented_in:
      - /etc/systemd/system/ipfs.service
      - /opt/nexus/scripts/setup-ipfs-private.sh
      - "/opt/nexus/ipfs/swarm.key  # runtime key, not in git"
    status: active
    notes: "MDNS disabled, auto relay disabled. 4-node full mesh, 0 public peers."

  - id: D007
    date: "2026-02"
    topic: ipfs-client-library
    decision: "Use IPFS HTTP API directly (requests) instead of ipfshttpclient library"
    rationale: >
      ipfshttpclient is not compatible with Kubo 0.32.1 (breaking API changes).
      Direct HTTP POST to /api/v0/* endpoints is more stable and version-independent.
    implemented_in:
      - /opt/nexus/libnexus/nexus_storage.py
    status: active
    notes: "nexus_storage.py uses requests.post to http://localhost:5001/api/v0/"

  - id: D008
    date: "2026-02"
    topic: shared-storage-location
    decision: "nexus-storage NFS share at /mnt/nexus-nas as cluster shared filesystem"
    rationale: >
      Central NFS share provides a single location for ChromaDB data, world model SQLite,
      shared logs, LLM models, and agent knowledge that must be accessible from
      nexus-admin. nexus-storage has 1.8TB HDD — the only node with adequate capacity.
    implemented_in:
      - /opt/nexus/automation/context_builder.py
      - /etc/systemd/system/chromadb.service
    status: active
    notes: >
      NAS subdirs: blockchain/, agents/, backups/, shared/, knowledge/, models/, logs/.
      world_model.db at /mnt/nexus-nas/knowledge/world_model.db (SQLite, AST-indexed).
      ChromaDB data at /mnt/nexus-nas/knowledge/chroma (accessed via HTTP localhost:8000).

