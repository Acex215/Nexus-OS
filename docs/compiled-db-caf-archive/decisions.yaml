      Worker agents handle narrow, repetitive tasks — SmolLM2-1.7B is sufficient and
      avoids API costs. Directors need broader reasoning — Llama-3.2-3B via HuggingFace.
      C-Suite (CEO/COO) needs strategic synthesis — Qwen2.5-7B. Local inference
      first avoids API latency/cost for high-frequency worker calls.
    implemented_in:
      - /opt/nexus/agents/llm_client.py
    status: active
    notes: >
      LOCAL_INFERENCE_URL: http://10.0.20.4:8090/v1/chat/completions (nexus-ai).
      HuggingFace router: https://router.huggingface.co/v1/chat/completions.
      Rate limit: 28 rpm (token-bucket). Workers: local→HuggingFace fallback.
      C-Suite/Directors: HuggingFace API directly.

