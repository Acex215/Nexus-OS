  - id: D015
    date: "2025-Q4"
    topic: agent-communication-substrate
    decision: "Discord as the agent communication and coordination layer"
    rationale: >
      Discord provides persistent message history, thread support, real-time webhooks,
      role-based access, and a human-readable audit trail without building custom
      messaging infrastructure. Guild "The Enterprise" (1441732155225931869) serves
      as the shared workspace for all 30 agents and human operators.
    implemented_in:
      - /opt/nexus/agents/hierarchy_manager.py
      - /opt/nexus/agents/agent_registry.py
      - /opt/nexus/automation/discord_comms.py
    status: active
    notes: "25 full bots + 5 webhook fallbacks. CAF orchestrator has its own Discord channel."

  - id: D016
    date: "2025-Q4"
    topic: agent-bot-split
    decision: "25 active Discord bots + 5 webhook-fallback agents (not all 30 full bots)"
    rationale: >
      Discord imposes bot limits per developer account. Webhook-only agents (no real-time
      event handling) don't need full bot tokens. This reduces token management overhead
      while maintaining presence for all 30 agents in Discord.
    implemented_in:
      - /opt/nexus/agents/hierarchy_manager.py
      - /opt/nexus/agents/.env
    status: active
    notes: "Quantum Director and others may be webhook-only. Tokens in agents/.env (chmod 600)."

  - id: D017
    date: "2025-Q4"
    topic: agent-workflow-framework
    decision: "LangGraph for agent multi-step reasoning workflows"
    rationale: >
      LangGraph provides a typed state machine with explicit nodes and edges for
      multi-step reasoning. Workflow: gather_context → analyze (leadership) → decide → finalize.
      Workers skip the analyze step. Each node produces intermediate state that feeds
      the next, giving structured, auditable reasoning chains.
    implemented_in:
      - /opt/nexus/agents/agent_workflow.py
    status: active
    notes: >
      constitution.json: "LangGraph for agent workflows. SmolAgents for narrow execution."
      SmolAgents: mentioned in constitution but zero smolagents imports found in codebase.
      LangGraph is the only implemented workflow framework.

  - id: D018
    date: "2025-Q4"
    topic: decision-hashing
    decision: "SHA256 reasoning hash per agent decision, logged to ReasoningLedger on-chain"
    rationale: >
      Full LLM decision text can be large and expensive to store on-chain. SHA256 hash
      provides cryptographic binding between off-chain JSONL decision logs and on-chain
      records. Anyone with the JSONL can verify the hash matches the chain entry.
    implemented_in:
      - /opt/nexus/agents/agent_workflow.py
      - /opt/nexus/agents/blockchain_logger.py
      - /opt/nexus/contracts/source/ReasoningLedger.sol
    status: active
    notes: >
      decision_str format: "{agent_id}: {task[:80]} (ect={cost})".
      reasoning_str: 64-char hex SHA256 of full reasoning chain.
      Off-chain full text at agents/logs/decisions/{agent_id}.jsonl.

