  # ════════════════════════════════════════════════════════════════
  # KUBERNETES — Cluster Orchestration
  # ════════════════════════════════════════════════════════════════

  - id: D028
    date: "2025-Q4"
    topic: container-orchestration
    decision: "K3s (lightweight Kubernetes) instead of full K8s or Docker Swarm"
    rationale: >
      Full Kubernetes is too resource-heavy for Pi 5 nodes (8GB RAM each). K3s removes
      cloud-provider integrations, in-tree storage drivers, and alpha features, fitting
      in ~512MB RAM on the control plane. Docker Swarm lacks the ecosystem depth needed.
      K3s flannel CNI provides adequate networking for the cluster.
    implemented_in:
      - /etc/systemd/system/k3s-agent.service
      - /etc/rancher/k3s/config.yaml
      - /opt/nexus/scripts/deploy-k3s-safe.sh
    status: active
    notes: >
      k3s-agent.service ACTIVE on nexus-admin (role=admin). Control plane at nexus-master.
      Infrastructure operational. No workloads deployed yet — K3s is the foundation for
      future containerized NEXUS services.

  # ════════════════════════════════════════════════════════════════
  # OS IMAGE — Distribution
  # ════════════════════════════════════════════════════════════════

  - id: D029
    date: "2026-02"
    topic: os-image-architecture
    decision: "Custom pi-gen stage (stage-nexus) on top of Bookworm Lite arm64"
    rationale: >
      Pi 500 uses a 16K page-size kernel, which is incompatible with armhf builds.
      arm64 (aarch64) is required. Bookworm Lite provides a minimal Debian base.
      pi-gen custom stage allows reproducible, automated OS image builds with NEXUS
      OS pre-installed (Geth, IPFS, blockchain, networking, first-boot wizard).
    implemented_in:
      - /opt/nexus/pi-gen/build.sh
      - /opt/nexus/pi-gen/stage-nexus/prerun.sh
      - /opt/nexus/pi-gen/stage-nexus/01-blockchain/01-run-chroot.sh
      - /opt/nexus/pi-gen/stage-nexus/06-first-boot/files/first_boot_wizard.py
    status: active
    notes: >
      Built image: deploy/image_2026-02-22-nexus-os-lite.zip (748MB).
      7 stage-nexus subdirs: 00-base-packages through 06-first-boot.
      stage prerun.sh MUST call copy_previous to inherit rootfs.

  - id: D030
    date: "2026-02"
    topic: node-onboarding
    decision: "Interactive first-boot wizard (Python) for node role assignment"
    rationale: >
      New cluster nodes need to know their role (validator/worker/admin), hostname, and
      blockchain credentials. A first-boot wizard runs once on new images, prompts for
      configuration, and persists settings — replacing manual post-install configuration.
    implemented_in:
      - /opt/nexus/pi-gen/stage-nexus/06-first-boot/files/first_boot_wizard.py
    status: active
    notes: "Registered as systemd one-shot service in image. 222 lines."

  # ════════════════════════════════════════════════════════════════
  # TOKEN ECONOMY — ECT/RST
  # ════════════════════════════════════════════════════════════════

  - id: D031
    date: "2025-Q4"
    topic: token-economy
    decision: "ECT (Execution Credit Token) and RST (Reputation Stake Token) govern agent resource allocation"
    rationale: >
      Token economy creates incentive structure: agents must spend ECT to execute tasks
      (preventing runaway computation), and RST stake means poor decisions carry
      reputation consequences. CEO: 1000 ECT/day. Directors: 500 ECT. Workers: 30 ECT.
    implemented_in:
      - /opt/nexus/agents/agent_registry.py
      - /opt/nexus/contracts/deployed/TokenManager.json
    status: partial
    notes: >
      CRITICAL GAP: TokenManager contract deployed at 0x08C9...8E48 but zero Python callers
      exist. ECT/RST values in agent_registry.py are LLM system prompt simulation parameters
      — the LLM is told it has a budget, but no actual on-chain token transfers occur.
      No TokenManager.sol source in repo. AgentGovernance and DecisionQuality similarly
      deployed but uncalled. Token economy is architectural intent, not runtime behavior.

  # ════════════════════════════════════════════════════════════════
  # LIBRARY DESIGN — libnexus
  # ════════════════════════════════════════════════════════════════

  - id: D032
    date: "2026-01"
    topic: kernel-abstraction
    decision: "libnexus provides 'syscall' abstraction: blockchain contract calls replace OS syscalls"
    rationale: >
      The core NEXUS OS concept: blockchain IS the kernel. Just as POSIX programs call
      open()/read()/write(), NEXUS programs call NexusKernel.log_reasoning()/register_node()/
      register_service(). This abstraction makes blockchain interaction as natural as
      standard library calls and hides web3 complexity from application code.
    implemented_in:
      - /opt/nexus/libnexus/kernel.py
      - /opt/nexus/libnexus/__init__.py
    status: active
    notes: >
      kernel.py docstring: "In NEXUS OS: programs call kernel via smart contracts."
      Verified operational: NexusKernel connects to chain, block=1720 confirmed.
      __init__.py v0.2.0 only exports NexusKernel (NexusStorage accessible via direct import).
      Despite documentation listing libnexus as "planned", it is fully built and functional.

