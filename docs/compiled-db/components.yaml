  - id: blockchain-logging
    name: "Blockchain Logger (ReasoningLedger)"
    status: operational
    description: >
      Logs agent decisions to ReasoningLedger smart contract on-chain. Each decision
      produces a SHA256 reasoning hash. Full decision text stays off-chain in JSONL;
      the on-chain hash proves integrity. Singleton pattern with nonce lock for
      concurrent access. 1170+ entries logged.
    files:
      - /opt/nexus/agents/blockchain_logger.py
    contract:
      name: "ReasoningLedger"
      address: "0x0317451264E1de1A0696A81f6141e72E58686DE4"
      rpc: "http://10.0.20.3:8545"
    wallet: "0x817B0842B208B76A7665948F8D1A0592F9b1e958"
    dependencies:
      - blockchain-kernel
      - smart-contracts
    last_validated: "2026-03-20"
    notes: >
      Uses correct VLAN 20 IP (10.0.20.3). Pending retry queue for failed submissions.
      Web3 calls run in thread executor to avoid blocking asyncio event loop.

