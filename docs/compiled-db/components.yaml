# NEXUS OS Compiled Database — Components
# Generated: 2026-03-21
# Scope: Dev Assistant pipeline (/opt/nexus/agents/) + shared infrastructure
# Supersedes: Previous compiled-db generated against CAF (/opt/nexus/automation/)
#
# NOTE: The CAF orchestrator (/opt/nexus/automation/dev_orchestrator.py and all
# automation/ files) is DEPRECATED. It was the first-generation autonomous agent,
# replaced by the Dev Assistant pipeline after iterating through multiple LLM
# strategies. CAF files remain on disk (untracked in git) but are not running.
# All gaps, interfaces, and dependencies in this compiled-db describe the
# LIVE system only.

components:

  # ════════════════════════════════════════════════════════════════
  # DEV ASSISTANT — Primary Agent Pipeline (LIVE)
  # ════════════════════════════════════════════════════════════════

  - id: dev-assistant-bot
    name: "Dev Assistant Discord Bot"
    status: operational
    description: >
      Human-in-the-loop development assistant operating in Discord #agent-chat.
      Accepts task descriptions, routes analysis to the coordinator LLM, generates
      SEARCH/REPLACE patch plans, executes with git branch isolation, and logs
      everything to blockchain. Supports both interactive (human-driven) and
      autonomous (queue-driven) modes. Entry point for all development task execution.
    files:
      - /opt/nexus/agents/dev_assistant.py
      - /opt/nexus/agents/queue_commands.py
    key_classes:
      - "DevAssistant(discord.Client) — main bot, handles on_message routing"
      - "TaskContext — dataclass tracking per-task state through the pipeline"
    constants:
      MAX_STEPS_PER_TASK: 10
      MAX_CLARIFICATION_ROUNDS: 2
      MAX_FILE_SIZE: 12000
    imports:
      - llm_router_v2.LLMRouter
      - blockchain_logger.get_blockchain_logger
      - task_queue.TaskQueue
      - queue_commands.handle_queue_command
      - autonomous_loop.AutonomousLoop
      - task_decomposer.decompose_task
      - knowledge_planner.get_planning_context
      - safety_gates.ScopeEnforcer
    dependencies:
      - llm-routing
      - blockchain-logging
      - task-queue
      - autonomous-loop
      - knowledge-layer
      - safety-layer
    last_validated: "2026-03-20"
    tests: "101/101 passing (74 Phase 3 + 27 Phase 4)"
    notes: >
      dev_assistant.py is in PROTECTED_PATHS — cannot be modified by the bot itself.
      Task states: analyzing → awaiting_clarification → planning → awaiting_approval →
      executing → done/failed. The system prompt explicitly marks /opt/nexus/automation/
      as "Old automation (DO NOT MODIFY)".

  # ════════════════════════════════════════════════════════════════
  # AUTONOMOUS EXECUTION
  # ════════════════════════════════════════════════════════════════

  - id: autonomous-loop
    name: "Autonomous Task Execution Loop"
    status: operational
    description: >
      Picks tasks from TaskQueue, executes through the dev_assistant pipeline,
      posts summary reports every 5 tasks, handles sub-task decomposition.
      Imported by dev_assistant.py; does NOT run its own event loop.
      Includes safety gate integration, scope enforcement, retry policy,
      and test validation at each step.
    files:
      - /opt/nexus/agents/autonomous_loop.py
    key_classes:
      - "AutonomousLoop — async loop with start/pause/resume/stop/focus"
    constants:
      SUMMARY_INTERVAL: 5
      TASK_COOLDOWN_SECONDS: 5
      POLL_INTERVAL_SECONDS: 30
      MAX_CONSECUTIVE_FAILURES: 3
    imports:
      - knowledge_indexer.index_task
      - safety_gates.SafetyGate
      - safety_gates.ScopeEnforcer
      - safety_gates.RetryPolicy
      - task_logger.log_task
      - task_logger.read_recent_logs
      - test_validator.TestValidator
    dependencies:
      - safety-layer
      - knowledge-layer
      - task-queue
    last_validated: "2026-03-20"
    notes: >
      MAX_CONSECUTIVE_FAILURES=3 pauses the loop but does NOT check if failures
      share the same root cause (carried forward from CAF gap G038 concept).

  - id: task-queue
    name: "Persistent YAML Task Queue"
    status: operational
    description: >
      Persistent task queue stored as YAML. Tracks task status (pending, in_progress,
      done, failed), priority, risk level, timestamps. Survives bot restarts.
      Queue commands exposed via Discord through queue_commands.py.
    files:
      - /opt/nexus/agents/task_queue.py
      - /opt/nexus/agents/task_queue.yaml
    dependencies: []
    last_validated: "2026-03-20"
    notes: "task_queue.yaml is gitignored. Queue commands: show queue, add task, status, show last N, remove, focus, etc."

  - id: task-decomposer
    name: "Task Decomposition via Coordinator"
    status: operational
    description: >
      Uses the coordinator LLM to break large tasks into ordered sub-tasks
      with dependency tracking. Called by autonomous_loop when a task is
      too complex for single-step execution.
    files:
      - /opt/nexus/agents/task_decomposer.py
    dependencies:
      - llm-routing
    last_validated: "2026-03-20"

  # ════════════════════════════════════════════════════════════════
  # LLM ROUTING
  # ════════════════════════════════════════════════════════════════

  - id: llm-routing
    name: "4-Tier LLM Router (v2)"
    status: operational
    description: >
      Routes LLM requests to the appropriate hardware tier based on agent ID
      and task type. 4 tiers with automatic fallback. Includes thinking token
      stripping for Qwen3.5 models. Async via aiohttp or httpx.
    files:
      - /opt/nexus/agents/llm_router_v2.py
    tiers:
      coordinator:
        model: "qwen/qwen3.5-35b-a3b"
        endpoint: "http://10.0.30.3:1234/v1/chat/completions"
        hardware: "ThinkStation (VLAN 30)"
        timeout: 600
        fallback: "qwen2.5-7b-instruct-1m on same endpoint"
        agents: ["ceo"]
        task_types: ["planning", "task_decomp", "code_review", "strategy"]
      coder:
        model: "qwen/qwen2.5-coder-14b"
        endpoint: "http://10.0.30.2:1234/v1/chat/completions"
        hardware: "ThinkPad (VLAN 30)"
        timeout: 300
        fallback: "qwen/qwen3.5-35b-a3b on ThinkStation (WARNING: wrong model for code)"
        agents: []
        task_types: ["code_gen", "agent_v2", "debugging", "patch_create"]
      director:
        model: "qwen2.5-7b-instruct-1m"
        endpoint: "http://10.0.30.3:1234/v1/chat/completions"
        hardware: "ThinkStation (VLAN 30, shared port, model-routed)"
        timeout: 120
        fallback: "qwen/qwen3.5-35b-a3b on same endpoint"
        agents: ["coo", "compute_director", "storage_director", "network_director",
                 "security_director", "blockchain_director", "ml_director", "quantum_director"]
        task_types: ["department_decision", "resource_allocation", "escalation"]
      worker:
        model: "llama3.2:1b"
        endpoint: "http://10.0.20.6:11434/v1/chat/completions"
        hardware: "nexus-ai2 via Ollama (VLAN 20)"
        timeout: 120
        fallback: "qwen2.5-7b-instruct-1m on ThinkStation"
        agents: ["process_scheduler", "load_balancer", "resource_monitor",
                 "backup_agent", "cache_manager", "flock_federator",
                 "mesh_coordinator", "vpn_manager", "dns_agent",
                 "auth_agent", "anomaly_detector", "audit_logger",
                 "contract_deployer", "token_manager", "consensus_monitor",
                 "training_coordinator", "inference_server", "dataset_manager",
                 "qaoa_optimizer", "circuit_builder", "noise_analyzer"]
        task_types: ["worker_task", "status_report", "simple_json"]
    dependencies:
      - llm-inference
    last_validated: "2026-03-20"
    notes: >
      KNOWN ISSUE (Roadmap 4.1): Coder tier falls back to coordinator model
      (qwen3.5-35b-a3b) when ThinkPad is offline. Coordinator model cannot
      produce valid SEARCH/REPLACE blocks — 100% failure rate. Fix: pre-flight
      health check for coder endpoint before task execution.

  # ════════════════════════════════════════════════════════════════
  # SAFETY & RELIABILITY
  # ════════════════════════════════════════════════════════════════

  - id: safety-layer
    name: "Safety Gates, Scope Enforcement, Retry Policy"
    status: operational
    description: >
      Risk-based execution gating (low=auto, medium=60s timeout, high=manual approval).
      Scope enforcement verifies file edits fall within declared scope.
      Retry policy with max 2 retries and error context injection.
      Destructive patch guards (max 10 net deletions, max 20% file shrinkage).
    files:
      - /opt/nexus/agents/safety_gates.py
      - /opt/nexus/agents/safety_config.py
      - /opt/nexus/agents/health_monitor.py
      - /opt/nexus/agents/test_validator.py
    key_classes:
      - "SafetyGate — risk classification and approval workflow"
      - "ScopeEnforcer — validates file edits against declared scope"
      - "RetryPolicy — max retries with error context"
      - "HealthMonitor — async checks for disk, LLM endpoints, blockchain"
      - "TestValidator — post-execution pytest runner"
    config:
      AUTO_APPROVE_LOW: true
      MEDIUM_RISK_TIMEOUT: 60
      HIGH_RISK_TIMEOUT: 0
      MAX_RETRIES: 2
      DISK_MIN_FREE_GB: 2.0
      LLM_HEALTH_TIMEOUT: 10
    dependencies: []
    last_validated: "2026-03-20"
    tests: "74/74 Phase 3 tests passing"
    notes: >
      KNOWN ISSUE (Roadmap 4.3): Destructive patch guard threshold (10 lines)
      too aggressive for docstring replacement tasks. Fix: make configurable
      via safety_config.py, default to 20.

  # ════════════════════════════════════════════════════════════════
  # KNOWLEDGE & LEARNING (Phase 4)
  # ════════════════════════════════════════════════════════════════

  - id: knowledge-layer
    name: "Knowledge & Learning Pipeline"
    status: operational
    description: >
      Structured task logging (JSONL), ChromaDB semantic indexing, knowledge-informed
      planning context injection, failure pattern recognition, and change tracking.
      Closes the learning loop: task outcomes feed back into future planning.
    files:
      - /opt/nexus/agents/task_logger.py
      - /opt/nexus/agents/knowledge_indexer.py
      - /opt/nexus/agents/knowledge_planner.py
      - /opt/nexus/agents/failure_analyzer.py
      - /opt/nexus/agents/change_analyzer.py
    key_functions:
      - "task_logger.log_task() — structured JSONL logging of every task outcome"
      - "knowledge_indexer.index_task() — ChromaDB upsert with async threading"
      - "knowledge_planner.get_planning_context() — injects similar past tasks into coordinator prompt"
      - "knowledge_planner.get_failure_warnings() — warns about previously failed similar tasks"
      - "failure_analyzer.format_failure_report() — categorized failure patterns"
      - "change_analyzer.format_changes_report() — what changed in last N hours"
    chromadb:
      host: "localhost"
      port: 8000
      collection: "dev_assistant_tasks"
      location: "nexus-admin:8000"
    dependencies:
      - chromadb-knowledge
    last_validated: "2026-03-20"
    tests: "27/27 Phase 4 tests passing"
    notes: >
      KNOWN ISSUE (Roadmap 4.4): First ChromaDB client creation triggers
      onnxruntime GPU discovery (slow on Pi), causing Discord heartbeat warnings.
      Fix: warm-up call during bot startup. Integration verified live: task logging,
      ChromaDB upsert, knowledge planner query all working.

