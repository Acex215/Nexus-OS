# NEXUS OS Compiled Database — Interfaces
# Generated: 2026-03-21
# Scope: Dev Assistant pipeline + shared infrastructure interfaces
#
# Only documents interfaces that are LIVE or OPERATIONAL.
# CAF-specific interfaces (IF001-IF021) are superseded.

interfaces:

  # ════════════════════════════════════════════════════════════════
  # DEV ASSISTANT → LLM ENDPOINTS
  # ════════════════════════════════════════════════════════════════

  - id: IF100
    name: "Dev Assistant → Coordinator LLM (ThinkStation)"
    caller: dev-assistant-bot
    callee: llm-inference
    protocol: "HTTP POST JSON (OpenAI-compatible)"
    entry_point: "/opt/nexus/agents/llm_router_v2.py → coordinator tier"
    endpoint: "http://10.0.30.3:1234/v1/chat/completions"
    model: "qwen/qwen3.5-35b-a3b"
    timeout: 600
    fallback: "qwen2.5-7b-instruct-1m on same endpoint"
    used_for: "Task analysis, planning, decomposition, code review, strategy"
    status: operational
    notes: "Thinking tokens stripped via strip_thinking_tokens(). 10min timeout due to model size."

  - id: IF101
    name: "Dev Assistant → Coder LLM (ThinkPad)"
    caller: dev-assistant-bot
    callee: llm-inference
    protocol: "HTTP POST JSON (OpenAI-compatible)"
    entry_point: "/opt/nexus/agents/llm_router_v2.py → coder tier"
    endpoint: "http://10.0.30.2:1234/v1/chat/completions"
    model: "qwen/qwen2.5-coder-14b"
    timeout: 300
    fallback: "qwen/qwen3.5-35b-a3b on ThinkStation (BROKEN — see G100)"
    used_for: "Code generation, SEARCH/REPLACE patches, debugging"
    status: operational
    notes: "ThinkPad sleep causes endpoint unreachable — disable sleep mode."

  - id: IF102
    name: "Dev Assistant → Director LLM (ThinkStation secondary)"
    caller: dev-assistant-bot
    callee: llm-inference
    protocol: "HTTP POST JSON (OpenAI-compatible)"
    entry_point: "/opt/nexus/agents/llm_router_v2.py → director tier"
    endpoint: "http://10.0.30.3:1234/v1/chat/completions"
    model: "qwen2.5-7b-instruct-1m"
    timeout: 120
    used_for: "Department decisions, resource allocation, escalation"
    status: operational
    notes: "Shares LM Studio port with coordinator — model-routed by LM Studio."

  - id: IF103
    name: "Dev Assistant → Worker LLM (nexus-ai2 Ollama)"
    caller: dev-assistant-bot
    callee: llm-inference
    protocol: "HTTP POST JSON (OpenAI-compatible via Ollama)"
    entry_point: "/opt/nexus/agents/llm_router_v2.py → worker tier"
    endpoint: "http://10.0.20.6:11434/v1/chat/completions"
    model: "llama3.2:1b"
    timeout: 120
    fallback: "qwen2.5-7b-instruct-1m on ThinkStation"
    used_for: "Worker tasks, status reports, simple JSON generation"
    status: operational
    notes: "Cross-VLAN: nexus-admin (VLAN 10/20) → nexus-ai2 (VLAN 20). Pi 5 CPU inference."

  # ════════════════════════════════════════════════════════════════
  # DEV ASSISTANT → DISCORD
  # ════════════════════════════════════════════════════════════════

  - id: IF104
    name: "Dev Assistant → Discord Gateway"
    caller: dev-assistant-bot
    callee: "Discord API"
    protocol: "WebSocket (discord.py library)"
    entry_point: "/opt/nexus/agents/dev_assistant.py → DevAssistant(discord.Client)"
    channel: "#agent-chat"
    guild_id: "1441732155225931869"
    used_for: "Human-in-the-loop task submission, approval, status, queue management"
    status: operational
    notes: >
      Bot token in /opt/nexus/agents/.env. Owner ID used for permission gating.
      Intents: messages, reactions, message_content. Single-channel operation.

  # ════════════════════════════════════════════════════════════════
  # DEV ASSISTANT → KNOWLEDGE STORE
  # ════════════════════════════════════════════════════════════════

  - id: IF105
    name: "Knowledge Layer → ChromaDB"
    caller: knowledge-layer
    callee: chromadb-knowledge
    protocol: "HTTP (ChromaDB Python client)"
    entry_point: "/opt/nexus/agents/knowledge_indexer.py"
    endpoint: "http://localhost:8000"
    collection: "dev_assistant_tasks"
    operations:
      upsert: "index_task() — stores task outcome with metadata"
      query: "query_similar_tasks() — semantic search by description"
    status: operational
    notes: >
      Singleton client. First call triggers onnxruntime GPU discovery (slow, see G103).
      All ChromaDB I/O wrapped in asyncio.to_thread to avoid blocking event loop.

  # ════════════════════════════════════════════════════════════════
  # DEV ASSISTANT → BLOCKCHAIN
  # ════════════════════════════════════════════════════════════════

  - id: IF106
    name: "Blockchain Logger → ReasoningLedger Contract"
    caller: blockchain-logging
    callee: smart-contracts
    protocol: "Web3 transact/call (web3.py)"
    entry_point: "/opt/nexus/agents/blockchain_logger.py"
    endpoint: "http://10.0.20.3:8545"
    contract: "ReasoningLedger @ 0x0317451264E1de1A0696A81f6141e72E58686DE4"
    wallet: "0x817B0842B208B76A7665948F8D1A0592F9b1e958"
    operations:
      logReasoning: "agent_id + task summary + SHA256 hash → on-chain entry"
      getEntry: "Read entry by index"
      getEntryCount: "Total entries (1170+)"
      verifyHash: "Compare on-chain reasoning hash with expected"
    status: operational
    notes: >
      Nonce lock (threading.Lock) serializes concurrent writes. Pending retry queue
      for failed submissions. Web3 calls in thread executor for async compatibility.

  # ════════════════════════════════════════════════════════════════
  # LIBNEXUS → SMART CONTRACTS
  # ════════════════════════════════════════════════════════════════

  - id: IF107
    name: "libnexus → ResourceManager Contract"
    caller: libnexus
    callee: smart-contracts
    protocol: "Web3 transact/call"
    entry_point: "/opt/nexus/libnexus/kernel.py"
    endpoint: "http://10.0.20.3:8545"
    contract: "ResourceManager @ 0x7E7f5e6cd9d7d485eeFa4Ec3Fb211705A3A8c6C6"
    operations:
      registerNode: "(hostname, cpu_cores, memory_gb, storage_gb, ai_tops)"
      getNode: "(wallet_address) → node info"
      getAllNodes: "() → list of registered addresses"
    status: operational

  - id: IF108
    name: "libnexus → ServiceRegistry Contract"
    caller: libnexus
    callee: smart-contracts
    protocol: "Web3 transact/call"
    entry_point: "/opt/nexus/libnexus/kernel.py"
    endpoint: "http://10.0.20.3:8545"
    contract: "ServiceRegistry @ 0xbd015B6A2C0E10E1f31b7C50580A2Cc86e3A0dd8"
    operations:
      register_service: "(name, config_hash)"
      deregister: "(name)"
      getService: "(name, node_address) → {active, config_hash, timestamp}"
    status: operational

  - id: IF109
    name: "libnexus → MeshRegistry Contract"
    caller: libnexus
    callee: smart-contracts
    protocol: "Web3 transact/call"
    entry_point: "/opt/nexus/libnexus/kernel.py"
    endpoint: "http://10.0.20.3:8545"
    contract: "MeshRegistry @ 0x21e59f66850bbC7333dE62fF5f7d6c2bcaD9A26F"
    operations:
      registerPeer: "(enode_url, wg_public_key, mesh_ip)"
      getPeer: "(wallet_address) → peer info"
      getAllPeers: "() → list of peers"
    status: operational

  - id: IF110
    name: "libnexus → StorageRegistry + IPFS"
    caller: libnexus
    callee: "smart-contracts + ipfs-storage"
    protocol: "Web3 transact/call + IPFS HTTP API"
    entry_point: "/opt/nexus/libnexus/nexus_storage.py"
    endpoint: "http://10.0.20.3:8545 (blockchain) + http://localhost:5001 (IPFS)"
    contract: "StorageRegistry @ 0x859e30a6b752Af6D96d309Dc3a5bECfCfFDe31A6"
    operations:
      store_file: "Upload to IPFS → register CID hash on-chain"
      retrieve_file: "Look up CID on-chain → fetch from IPFS"
    status: operational
    notes: "CID index at /opt/nexus/libnexus/cid_index.json. ipfshttpclient replaced with direct HTTP API."
